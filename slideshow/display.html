<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bulletin Board Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bar-h:   52px;
  --accent:  #f0c040;
  --accent2: #ffdd77;
  --dark:    #0d0d14;
  --glass:   rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.10);
  --text:    rgba(255,255,255,0.90);
  --muted:   rgba(255,255,255,0.38);
  --tr:      0.72s cubic-bezier(0.77,0,0.18,1);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--dark);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
}

/* ══ LOADER ══ */
#loader {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.6s;
}
#loader.fade { opacity: 0; pointer-events: none; }
.loader-ring {
  width: 48px; height: 48px;
  border: 3px solid rgba(240,192,64,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 0.16em; color: var(--muted);
}

/* ══ TOP NAVBAR ══ */
#top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--bar-h);
  background: rgba(8,8,18,0.90);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  z-index: 200;
  overflow: hidden;
}

.bar-section {
  display: flex; align-items: center;
  height: 100%;
  padding: 0 14px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
}
.bar-section:last-child { border-right: none; margin-left: auto; }

/* Brand */
.bar-brand { gap: 9px; padding: 0 16px 0 14px; }
.bar-brand-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg,#2563eb,#60a5fa);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.bar-brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 14px; color: var(--text); white-space: nowrap; line-height: 1;
}

/* Weather */
.bar-weather { gap: 10px; }
.wx-icon-sm { font-size: 22px; line-height: 1; }
.wx-temp-sm {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: var(--text); line-height: 1;
}
.wx-details { display: flex; flex-direction: column; gap: 2px; }
.wx-desc-sm { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: capitalize; }
.wx-pills   { display: flex; gap: 5px; }
.wx-pill {
  font-size: 9px; color: var(--muted);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 99px; padding: 1px 7px; white-space: nowrap;
}
.wx-label { font-size: 8px; color: rgba(255,255,255,0.28); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

/* Calendar */
.bar-cal { gap: 8px; }
.cal-month-nav { display: flex; align-items: center; gap: 5px; }
.cal-nav-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 14px; padding: 2px 3px; transition: color 0.2s; line-height: 1;
}
.cal-nav-btn:hover { color: var(--text); }
.cal-month-label {
  font-size: 10px; font-weight: 700; color: var(--text);
  white-space: nowrap; min-width: 56px; text-align: center; letter-spacing: 0.04em;
}
.cal-days { display: flex; gap: 3px; }
.cal-col  { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cal-dn   { font-size: 8px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.cal-dd   {
  width: 21px; height: 21px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--muted);
}
.cal-dd.today {
  background: var(--accent); color: #111; font-weight: 700;
  box-shadow: 0 0 8px rgba(240,192,64,0.35);
}

/* Slides ticker */
.bar-slides { gap: 8px; flex: 1; min-width: 0; overflow: hidden; }
.slides-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap; flex-shrink: 0;
}
.slides-ticker {
  display: flex; align-items: center; gap: 5px;
  overflow: hidden; min-width: 0;
}
.slide-chip {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.09);
  border-radius: 99px; padding: 3px 10px;
  font-size: 11px; color: var(--muted); white-space: nowrap;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.slide-chip:hover { border-color: rgba(240,192,64,0.35); color: var(--accent); }
.slide-chip.active {
  background: rgba(240,192,64,0.10); border-color: rgba(240,192,64,0.32);
  color: var(--accent); font-weight: 600;
}
.slide-chip-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0; transition: background 0.2s;
}
.slide-chip.active .slide-chip-dot { background: var(--accent); }

/* Clock */
.bar-clock { gap: 10px; }
.clock-block { line-height: 1; }
.clock-hm {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; color: var(--text); letter-spacing: 0.02em;
}
.clock-hm .clock-sec { font-size: 14px; color: var(--muted); }
.clock-ampm {
  font-size: 8px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-top: 2px;
}
.clock-date {
  font-size: 9px; color: rgba(255,255,255,0.28); white-space: nowrap; margin-top: 1px;
}

/* Actions */
.bar-actions { gap: 7px; padding: 0 12px; border-right: none; }
#admin-link {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 7px;
  background: rgba(37,99,235,0.14); border: 1px solid rgba(37,99,235,0.28);
  color: rgba(100,150,255,0.85);
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  text-decoration: none; white-space: nowrap; transition: all 0.2s;
}
#admin-link:hover { background: rgba(37,99,235,0.26); color: #a0c0ff; }
.close-btn-bar {
  width: 26px; height: 26px; border-radius: 7px;
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: var(--muted); cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.close-btn-bar:hover { background: rgba(220,38,38,0.18); border-color: rgba(220,38,38,0.36); color: #f87171; }

/* ══ SLIDER ══ */
.slider {
  position: fixed;
  top: var(--bar-h); left: 0; right: 0; bottom: 0;
  background: #0a0a14; cursor: grab; user-select: none; overflow: hidden;
}
.slider:active { cursor: grabbing; }
.slider::before {
  content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

.progress-bar {
  position: absolute; top: 0; left: 0;
  height: 2px; width: 0%;
  background: linear-gradient(90deg,var(--accent),var(--accent2));
  z-index: 20; pointer-events: none; border-radius: 0 2px 2px 0;
  box-shadow: 0 0 8px rgba(240,192,64,0.5);
}

.slides-track {
  display: flex; height: 100%; width: max-content;
  will-change: transform; transition: transform var(--tr);
}

.slide {
  width: 100vw; height: 100%;
  position: relative; overflow: hidden; flex-shrink: 0;
}

.slide-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  transform: scale(1.06); transition: transform var(--tr);
}
.slide.active .slide-bg { transform: scale(1.0); }

.slide-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transform: scale(1.06); transition: transform var(--tr);
}
.slide.active .slide-img { transform: scale(1.0); }

.slide-vid {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}

/* Minimal overlay — transparent blend */
.slide-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: linear-gradient(
    to top,
    rgba(0,0,0,0.28) 0%,
    rgba(0,0,0,0.04) 40%,
    transparent 100%
  );
}

/* Content (image/video) — bottom, transparent */
.slide-content {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
  padding: clamp(20px,4%,52px);
  background: transparent;
  transform: translateY(14px); opacity: 0;
  transition: transform 0.6s 0.15s ease, opacity 0.6s 0.15s ease;
}
.slide.active .slide-content { transform: translateY(0); opacity: 1; }

/* Content centered (text slides) — transparent */
.slide-content-center {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: clamp(32px,6vw,100px) clamp(32px,8vw,140px);
  background: transparent;
  transform: translateY(14px); opacity: 0;
  transition: transform 0.6s 0.15s ease, opacity 0.6s 0.15s ease;
}
.slide.active .slide-content-center { transform: translateY(0); opacity: 1; }

/* Frosted glass tag */
.slide-tag {
  display: inline-block;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.20);
  color: rgba(255,255,255,0.88);
  font-size: 0.68rem; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 4px 13px; border-radius: 4px; margin-bottom: 10px;
}

.slide-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem,5.5vw,5rem);
  color: #fff; letter-spacing: 0.04em; line-height: 1.05; margin-bottom: 10px;
  text-shadow: 0 2px 32px rgba(0,0,0,0.55), 0 1px 4px rgba(0,0,0,0.45);
}
.slide-content-center .slide-title {
  font-size: clamp(2.5rem,7vw,6.5rem); margin-bottom: 16px; word-break: break-word;
}

.slide-body {
  font-size: clamp(0.82rem,1.8vw,1.1rem);
  color: rgba(255,255,255,0.88); font-weight: 300; line-height: 1.65; max-width: 560px;
  text-shadow: 0 1px 12px rgba(0,0,0,0.45);
}
.slide-content-center .slide-body {
  font-weight: 700; color: rgba(255,255,255,0.92); width: 100%; line-height: 1.55;
  text-shadow: 0 2px 28px rgba(0,0,0,0.50), 0 1px 4px rgba(0,0,0,0.40);
  overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; word-break: break-word;
}
.slide-content-center .slide-tag { margin-bottom: 16px; }

.slide-number {
  position: absolute; top: clamp(10px,1.5vh,20px); right: clamp(10px,1.5vw,20px); z-index: 6;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(0.6rem,0.9vw,0.85rem); letter-spacing: 0.12em;
  color: rgba(255,255,255,0.32);
  opacity: 0; transform: translateY(-8px);
  transition: opacity 0.4s 0.3s, transform 0.4s 0.3s; pointer-events: none;
}
.slide.active .slide-number { opacity: 1; transform: translateY(0); }
.slide-number strong { color: var(--accent); }

/* Arrows */
.arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 10; width: clamp(36px,4vw,52px); height: clamp(36px,4vw,52px); border-radius: 50%;
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.16);
  backdrop-filter: blur(12px); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s, border-color 0.2s;
}
.arrow:hover { background: var(--accent); border-color: var(--accent); color: #111; transform: translateY(-50%) scale(1.1); }
.arrow:active { transform: translateY(-50%) scale(0.94); }
.arrow-prev { left: clamp(8px,1.5vw,22px); }
.arrow-next { right: clamp(8px,1.5vw,22px); }
.arrow svg  { width: clamp(14px,1.8vw,22px); height: clamp(14px,1.8vw,22px); }

/* Dots + Play */
.slider-controls {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; align-items: center; gap: 12px;
}
.dots { display: flex; align-items: center; gap: 7px; }
.dot {
  width: 7px; height: 7px; border-radius: 4px;
  background: rgba(255,255,255,0.22); cursor: pointer; border: none; padding: 0;
  transition: width 0.35s, background 0.3s;
}
.dot.active { width: 24px; background: var(--accent); box-shadow: 0 0 8px rgba(240,192,64,0.4); }
.play-btn {
  width: clamp(30px,3.2vw,38px); height: clamp(30px,3.2vw,38px); border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14);
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.15s; backdrop-filter: blur(8px);
}
.play-btn:hover { background: var(--accent); border-color: var(--accent); color: #111; transform: scale(1.1); }
.play-btn svg { width: 13px; height: 13px; }

/* Empty state */
#empty-state {
  position: absolute; inset: 0; z-index: 8; display: none;
  flex-direction: column; align-items: center; justify-content: center; gap: 12px;
}
#empty-state.show { display: flex; }
#empty-state .ei { font-size: 48px; }
#empty-state p {
  font-family: 'Bebas Neue', sans-serif; font-size: 20px;
  letter-spacing: 0.1em; color: rgba(255,255,255,0.22);
}
#empty-state small { font-size: 11px; color: rgba(255,255,255,0.14); }

/* Text slide themes */
.theme-blue   { background: linear-gradient(145deg,#0a1628,#1a3a6e,#0d2040); }
.theme-purple { background: linear-gradient(145deg,#160822,#3d1a6e,#120620); }
.theme-green  { background: linear-gradient(145deg,#041410,#0e4028,#061810); }
.theme-amber  { background: linear-gradient(145deg,#130a00,#5a2e00,#1a0e00); }
.theme-rose   { background: linear-gradient(145deg,#1a0410,#6e1040,#180310); }
.theme-teal   { background: linear-gradient(145deg,#021414,#0a4040,#021818); }

/* Sound pill */
#sound-unlock-wrap { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 999; }
.sound-pill {
  background: rgba(0,0,0,0.72); backdrop-filter: blur(12px);
  border: 1px solid rgba(240,192,64,0.35); border-radius: 99px;
  padding: 9px 20px;
  font-family: 'Bebas Neue', sans-serif; font-size: 13px;
  letter-spacing: 0.12em; color: rgba(255,255,255,0.70); cursor: pointer; white-space: nowrap;
  animation: fadeInUp 0.5s ease both;
}
@keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* Responsive */
@media (max-width: 960px) { .bar-cal { display: none; } }
@media (max-width: 720px) {
  :root { --bar-h: 46px; }
  .bar-slides { display: none; }
  .wx-pills { display: none; }
}
@media (max-width: 500px) {
  :root { --bar-h: 42px; }
  .bar-brand-name { display: none; }
  .wx-desc-sm { display: none; }
}
</style>
</head>

const WX_ICONS = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'};

/* DOM */
const track    = document.getElementById('slidesTrack');
const dotsWrap = document.getElementById('dots');
const ticker   = document.getElementById('slides-ticker');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');
const playBtn  = document.getElementById('playBtn');
const progBar  = document.getElementById('progressBar');
const sliderEl = document.getElementById('slider');
const emptyEl  = document.getElementById('empty-state');

/* State */
let posts=[],slides=[],dotBtns=[],chipBtns=[];
let cur=0,playing=true,autoTmr=null,progTmr=null,progStart=0,interval=7000,firstLoad=true;

/* Slider core */
function goTo(n){
  if(!slides.length)return;
  slides[cur]?.querySelector('video')?.pause();
  cur=((n%slides.length)+slides.length)%slides.length;
  track.style.transform=`translateX(-${cur*100}vw)`;
  slides.forEach((s,i)=>s.classList.toggle('active',i===cur));
  dotBtns.forEach((d,i)=>d.classList.toggle('active',i===cur));
  chipBtns.forEach((c,i)=>c.classList.toggle('active',i===cur));
  const vid=slides[cur]?.querySelector('video');
  if(vid){vid.currentTime=0;vid.play().catch(()=>{});}
}
function resetProg(){
  progStart=performance.now();
  progBar.style.transition='none'; progBar.style.width='0%';
  void progBar.offsetWidth;
}
function tickProg(){ progBar.style.width=Math.min(((performance.now()-progStart)/interval)*100,100)+'%'; }
function startAuto(){
  stopAuto(); if(!slides.length)return;
  interval=Number(posts[cur]?.duration)||7000;
  const vid=slides[cur]?.querySelector('video');
  if(vid){ interval=60000; vid.onended=()=>{goTo(cur+1);startAuto();}; vid.play().catch(()=>{}); }
  resetProg();
  progTmr=setInterval(tickProg,50);
  autoTmr=setTimeout(()=>{goTo(cur+1);startAuto();},interval);
}
function stopAuto(){ clearTimeout(autoTmr);autoTmr=null;clearInterval(progTmr);progTmr=null; }

function x(str){ return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* Rebuild from posts */
function rebuild(){
  stopAuto();
  track.innerHTML=''; dotsWrap.innerHTML=''; ticker.innerHTML='';
  slides=[]; dotBtns=[]; chipBtns=[];
  if(!posts.length){
    emptyEl.classList.add('show');
    prevBtn.style.visibility='hidden'; nextBtn.style.visibility='hidden'; return;
  }
  emptyEl.classList.remove('show');
  prevBtn.style.visibility=''; nextBtn.style.visibility='';

  posts.forEach((p,i)=>{
    const s=document.createElement('div'); s.className='slide';

    if(p.type==='text'){
      const bg=document.createElement('div'); bg.className='slide-bg theme-'+(p.bgtheme||'blue');
      const ov=document.createElement('div'); ov.className='slide-overlay';
      const co=document.createElement('div'); co.className='slide-content-center';
      const len=(p.content||'').length;
      const fs=len<=60?'clamp(1.6rem,3.2vw,2.4rem)':len<=120?'clamp(1.3rem,2.6vw,2.0rem)':len<=220?'clamp(1.1rem,2.2vw,1.6rem)':len<=350?'clamp(0.95rem,1.9vw,1.35rem)':len<=500?'clamp(0.85rem,1.6vw,1.15rem)':'clamp(0.75rem,1.4vw,1.0rem)';
      co.innerHTML='<span class="slide-tag">'+x(p.category||'Announcement')+'</span>'
        +'<h2 class="slide-title">'+x(p.title||'')+'</h2>'
        +'<p class="slide-body" style="font-size:'+fs+'">'+x(p.content||'')+'</p>';
      s.append(bg,ov,co);
    } else if(p.type==='image'){
      const img=document.createElement('img'); img.className='slide-img'; img.src=p.mediaUrl||''; img.alt=p.title||'';
      const ov=document.createElement('div'); ov.className='slide-overlay';
      const co=document.createElement('div'); co.className='slide-content';
      co.innerHTML='<span class="slide-tag">'+x(p.category||'Photo')+'</span>'
        +'<h2 class="slide-title">'+x(p.title||'')+'</h2>'
        +(p.content?'<p class="slide-body">'+x(p.content)+'</p>':'');
      s.append(img,ov,co);
    } else if(p.type==='video'){
      const vid=document.createElement('video'); vid.className='slide-vid'; vid.muted=false; vid.playsInline=true; vid.preload='auto';
      const src=document.createElement('source'); src.src=p.mediaUrl||''; src.type='video/mp4';
      vid.appendChild(src);
      const ov=document.createElement('div'); ov.className='slide-overlay';
      const co=document.createElement('div'); co.className='slide-content';
      co.innerHTML='<span class="slide-tag">'+x(p.category||'Video')+'</span>'
        +'<h2 class="slide-title">'+x(p.title||'')+'</h2>';
      s.append(vid,ov,co);
    }

    const num=document.createElement('div'); num.className='slide-number';
    num.innerHTML='<strong>'+String(i+1).padStart(2,'0')+'</strong> / '+String(posts.length).padStart(2,'0');
    s.appendChild(num); track.appendChild(s); slides.push(s);

    /* Dot */
    const d=document.createElement('button'); d.className='dot'; d.setAttribute('aria-label','Slide '+(i+1));
    d.addEventListener('click',e=>{e.stopPropagation();goTo(i);startAuto();});
    dotsWrap.appendChild(d); dotBtns.push(d);

    /* Ticker chip */
    const chip=document.createElement('div'); chip.className='slide-chip';
    chip.innerHTML='<div class="slide-chip-dot"></div><span>'+x(p.title||'Slide '+(i+1))+'</span>';
    chip.addEventListener('click',()=>{goTo(i);if(playing)startAuto();});
    ticker.appendChild(chip); chipBtns.push(chip);
  });
}

/* Firebase */
onValue(ref(db,'posts'),snap=>{
  const prevKey=posts[cur]?._key??null; posts=[];
  if(snap.exists())snap.forEach(c=>posts.push({_key:c.key,...c.val()}));
  rebuild();
  if(firstLoad){
    firstLoad=false; cur=0; goTo(0); startAuto();
    const ldr=document.getElementById('loader');
    if(ldr){ldr.classList.add('fade');setTimeout(()=>ldr.remove(),700);}
  } else {
    stopAuto(); const ni=posts.findIndex(p=>p._key===prevKey);
    cur=ni>=0?ni:0; goTo(cur); startAuto();
  }
});
get(ref(db,'posts')).then(snap=>{
  if(snap.exists()&&posts.length===0){
    posts=[]; snap.forEach(c=>posts.push({_key:c.key,...c.val()}));
    rebuild(); cur=0; goTo(0); startAuto();
  }
  const ldr=document.getElementById('loader');
  if(ldr){ldr.classList.add('fade');setTimeout(()=>ldr.remove(),700);}
}).catch(()=>{
  const ldr=document.getElementById('loader');
  if(ldr){ldr.classList.add('fade');setTimeout(()=>ldr.remove(),700);}
});

/* Play/Pause */
function togglePlay(){
  playing=!playing;
  document.getElementById('iconPause').style.display=playing?'':'none';
  document.getElementById('iconPlay').style.display=playing?'none':'';
  if(playing)startAuto(); else{stopAuto();slides[cur]?.querySelector('video')?.pause();}
}
playBtn.addEventListener('click',togglePlay);

/* Arrows */
prevBtn.addEventListener('click',e=>{e.stopPropagation();goTo(cur-1);if(playing)startAuto();});
nextBtn.addEventListener('click',e=>{e.stopPropagation();goTo(cur+1);if(playing)startAuto();});

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){goTo(cur-1);if(playing)startAuto();}
  else if(e.key==='ArrowRight'){goTo(cur+1);if(playing)startAuto();}
  else if(e.key===' '){e.preventDefault();togglePlay();}
  else if(e.key==='f'||e.key==='F'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen().catch(()=>{});}
});

/* Touch/drag */
let touchStartX=0,mouseStartX=0,dragging=false;
sliderEl.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
sliderEl.addEventListener('touchend',e=>{
  const diff=touchStartX-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50){diff>0?goTo(cur+1):goTo(cur-1);if(playing)startAuto();}
},{passive:true});
sliderEl.addEventListener('mousedown',e=>{
  if(e.target.closest('button,a'))return;
  mouseStartX=e.clientX; dragging=true; track.style.transition='none';
});
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  track.style.transform=`translateX(calc(-${cur*100}vw + ${(e.clientX-mouseStartX)*0.5}px))`;
});
window.addEventListener('mouseup',e=>{
  if(!dragging)return; dragging=false; track.style.transition='';
  const diff=mouseStartX-e.clientX;
  if(Math.abs(diff)>60){diff>0?goTo(cur+1):goTo(cur-1);if(playing)startAuto();}else goTo(cur);
});

/* Sound unlock */
const su=document.createElement('div'); su.id='sound-unlock-wrap';
su.innerHTML='<div class="sound-pill">🔇 TAP ANYWHERE TO ENABLE SOUND</div>';
document.body.appendChild(su);
document.addEventListener('click',function unlock(){
  slides.forEach(s=>{const v=s.querySelector('video');if(v)v.muted=false;});
  su.remove(); document.removeEventListener('click',unlock);
},{once:false});

/* Clock */
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MSHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function tick(){
  const n=new Date(); let h=n.getHours(); const ap=h>=12?'PM':'AM'; h=h%12||12;
  document.getElementById('b-h').textContent=String(h).padStart(2,'0');
  document.getElementById('b-m').textContent=String(n.getMinutes()).padStart(2,'0');
  document.getElementById('b-s').textContent=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('b-ampm').textContent=ap;
  document.getElementById('b-date').textContent=
    DAYS[n.getDay()].slice(0,3).toUpperCase()+', '+
    MSHORT[n.getMonth()].toUpperCase()+' '+n.getDate()+', '+n.getFullYear();
}
setInterval(tick,1000); tick();

/* Calendar */
let calOffset=0;
const DN=['Su','Mo','Tu','We','Th','Fr','Sa'];
function buildCal(){
  const now=new Date();
  const base=new Date(now); base.setMonth(base.getMonth()+calOffset);
  document.getElementById('cal-month-label').textContent=MSHORT[base.getMonth()]+' '+base.getFullYear();
  const calEl=document.getElementById('cal-days'); calEl.innerHTML='';
  for(let off=-2;off<=4;off++){
    const d=new Date(now); d.setDate(now.getDate()+off+(calOffset*30));
    const isToday=d.toDateString()===now.toDateString()&&calOffset===0;
    const col=document.createElement('div'); col.className='cal-col';
    const dn=document.createElement('div'); dn.className='cal-dn'; dn.textContent=DN[d.getDay()];
    const dd=document.createElement('div'); dd.className='cal-dd'+(isToday?' today':''); dd.textContent=d.getDate();
    col.append(dn,dd); calEl.appendChild(col);
  }
}
document.getElementById('cal-prev').addEventListener('click',()=>{calOffset--;buildCal();});
document.getElementById('cal-next').addEventListener('click',()=>{calOffset++;buildCal();});
buildCal();

/* Weather */
async function fetchWeather(){
  try{
    const r=await fetch('https://api.openweathermap.org/data/2.5/weather?q='+encodeURIComponent(OWM_CITY)+'&appid='+OWM_KEY+'&units=metric');
    const j=await r.json(); if(j.cod!==200)throw 0;
    document.getElementById('wx-icon').textContent=WX_ICONS[j.weather[0].icon]||'🌡️';
    document.getElementById('wx-temp').textContent=Math.round(j.main.temp)+'°';
    document.getElementById('wx-desc').textContent=j.weather[0].description;
    document.getElementById('wx-feels').textContent=Math.round(j.main.feels_like)+'°';
    document.getElementById('wx-hum').textContent=j.main.humidity+'%';
    document.getElementById('wx-wind').textContent=Math.round(j.wind.speed*3.6)+'km/h';
    if(j.coord){
      document.getElementById('wx-coords').textContent=j.coord.lat.toFixed(2)+'°N, '+j.coord.lon.toFixed(2)+'°E';
      document.getElementById('wx-coords-pill').style.display='';
    }
  }catch{document.getElementById('wx-desc').textContent='Unavailable';}
}
fetchWeather(); setInterval(fetchWeather,600000);
</script>
