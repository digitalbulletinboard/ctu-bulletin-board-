<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Digital Bulletin Board</title>
<link rel="shortcut icon" href="logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:     #f0c040;
    --accent2:    #ffdd77;
    --dark:       #0d0d0d;
    --light:      #f5f2eb;
    --glass:      rgba(255,255,255,0.08);
    --transition: 0.72s cubic-bezier(0.77, 0, 0.18, 1);
    --bar-h:      86px;
    --arrow-size: 52px;
    --slide-pad-x: clamp(20px, 5vw, 80px);
    --slide-pad-y: clamp(20px, 5vh, 60px);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    transition: opacity 0.6s;
  }
  #loader.fade { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 56px; height: 56px;
    border: 3px solid rgba(240,192,64,0.18);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.35);
  }

  /* ═══════════════════════════════════════════════════════
     SLIDER — fullscreen, exact structure from working slider
  ═══════════════════════════════════════════════════════ */
  .slider {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: var(--bar-h);
    background: #111;
    cursor: grab;
    user-select: none;
    overflow: hidden;
  }
  .slider:active { cursor: grabbing; }

  /* Grain texture */
  .slider::before {
    content: '';
    position: absolute; inset: 0; z-index: 5;
    opacity: 0.03; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* TRACK — flex row, slides sit side by side */
  .slides-track {
    display: flex;
    height: 100%;
    width: max-content;        /* prevent flex from compressing the row */
    will-change: transform;
    transition: transform var(--transition);
  }

  /* SLIDE */
  .slide {
    width: 100vw;              /* each slide = full viewport width */
    height: 100%;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Gradient bg for text slides */
  .slide-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transform: scale(1.06);
    transition: transform var(--transition);
  }
  .slide.active .slide-bg { transform: scale(1.0); }

  /* Image for image slides */
  .slide-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    transform: scale(1.06);
    transition: transform var(--transition);
  }
  .slide.active .slide-img { transform: scale(1.0); }

  /* Video */
  .slide-vid {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Overlay — transparent, just a subtle vignette to keep text readable */
  .slide-overlay {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.28) 0%,
      rgba(0,0,0,0.04) 40%,
      transparent 100%
    );
  }

  /* SLIDE CONTENT — bottom left, animates up on active */
  .slide-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 2;
    padding: clamp(24px, 5%, 60px);
    transform: translateY(14px);
    opacity: 0;
    transition: transform 0.6s 0.15s ease, opacity 0.6s 0.15s ease;
    /* fully transparent widget — blends into slide */
    background: transparent;
  }
  .slide.active .slide-content { transform: translateY(0); opacity: 1; }

  /* Text slides: centered, full coverage */
  .slide-content-center {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(40px, 8vw, 120px) clamp(40px, 10vw, 160px);
    transform: translateY(14px);
    opacity: 0;
    transition: transform 0.6s 0.15s ease, opacity 0.6s 0.15s ease;
    /* fully transparent — gradient bg shows through */
    background: transparent;
  }
  .slide.active .slide-content-center { transform: translateY(0); opacity: 1; }

  .slide-tag {
    display: inline-block;
    /* glass pill — readable on any background */
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.90);
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 4px 13px; border-radius: 4px; margin-bottom: 10px;
  }

  .slide-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5.5vw, 5rem);
    color: #fff; letter-spacing: 0.04em;
    line-height: 1.05; margin-bottom: 10px;
    /* strong drop-shadow keeps text legible over any image/video */
    text-shadow:
      0 2px 32px rgba(0,0,0,0.55),
      0 1px 4px rgba(0,0,0,0.45);
  }

  .slide-body {
    font-size: clamp(0.82rem, 1.8vw, 1.1rem);
    color: rgba(255,255,255,0.88);
    font-weight: 300; line-height: 1.65; max-width: 560px;
    text-shadow: 0 1px 12px rgba(0,0,0,0.45);
  }

  /* Bold centered body for text slides */
  .slide-content-center .slide-body {
    font-weight: 700;
    color: rgba(255,255,255,0.92);
    width: 100%;
    line-height: 1.55;
    text-shadow:
      0 2px 28px rgba(0,0,0,0.50),
      0 1px 4px rgba(0,0,0,0.40);
    overflow: hidden;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    word-break: break-word;
    /* font-size set dynamically by JS based on character count */
  }

  .slide-content-center .slide-title {
    font-size: clamp(2.5rem, 7vw, 6rem);
    margin-bottom: 16px;
    text-align: center;
    word-break: break-word;
  }

  .slide-content-center .slide-tag {
    margin-bottom: 16px;
  }

  /* Slide number — top right */
  .slide-number {
    position: absolute; top: 22px; right: 22px; z-index: 6;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.88rem; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.45);
    opacity: 0; transform: translateY(-8px);
    transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
    pointer-events: none;
  }
  .slide.active .slide-number { opacity: 1; transform: translateY(0); }
  .slide-number strong { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-bar {
    position: absolute; top: 0; left: 0;
    height: 3px; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    z-index: 20; pointer-events: none;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 10px rgba(240,192,64,0.55);
  }

  /* ARROWS */
  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.2s, border-color 0.2s;
    pointer-events: all;
  }
  .arrow:hover {
    background: var(--accent); border-color: var(--accent);
    color: var(--dark); transform: translateY(-50%) scale(1.1);
  }
  .arrow:active { transform: translateY(-50%) scale(0.94); }
  .arrow-prev { left: 20px; }
  .arrow-next { right: 20px; }
  .arrow svg { width: 22px; height: 22px; }

  /* DOTS + PLAY/PAUSE — bottom center of slider */
  .slider-controls {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex; align-items: center; gap: 14px;
  }

  .dots { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 8px; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.25);
    cursor: pointer; border: none; padding: 0;
    transition: width 0.35s ease, background 0.3s;
  }
  .dot.active {
    width: 28px; background: var(--accent);
    box-shadow: 0 0 10px rgba(240,192,64,0.4);
  }

  .play-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    backdrop-filter: blur(8px);
  }
  .play-btn:hover {
    background: var(--accent); border-color: var(--accent);
    color: var(--dark); transform: scale(1.1);
  }
  .play-btn svg { width: 15px; height: 15px; }

  /* EMPTY STATE */
  #empty-state {
    position: absolute; inset: 0; z-index: 8;
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  #empty-state.show { display: flex; }
  #empty-state .ei { font-size: 54px; }
  #empty-state p {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);
  }
  #empty-state small { font-size: 12px; color: rgba(255,255,255,0.15); }

  /* ═══════════════════════════════════════════════════════
     INFO BAR — LIQUID TRANSPARENT WIDGET
  ═══════════════════════════════════════════════════════ */

  /* Liquid shimmer keyframe */
  @keyframes liquid-shift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Orb float animations */
  @keyframes orb-float-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%       { transform: translate(20px, -8px) scale(1.08); }
    66%       { transform: translate(-12px, 5px) scale(0.95); }
  }
  @keyframes orb-float-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    40%       { transform: translate(-18px, 6px) scale(1.06); }
    70%       { transform: translate(14px, -4px) scale(0.97); }
  }
  @keyframes orb-float-3 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50%       { transform: translate(8px, -10px) scale(1.04); }
  }

  /* Border shimmer */
  @keyframes border-glow {
    0%, 100% { opacity: 0.18; }
    50%       { opacity: 0.45; }
  }

  #info-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: rgba(255, 255, 255, 0.08);
    border-top: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    align-items: center;
    padding: 0 28px; gap: 20px;
    z-index: 100;
  }

  #info-bar::before, #info-bar::after { display: none !important; }

  /* Floating ambient orbs — liquid blobs behind the glass */
  #info-bar-orbs {
    position: absolute; inset: 0; overflow: hidden;
    pointer-events: none; z-index: -3;
  }
  #info-bar-orbs .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(22px);
    opacity: 0;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }
  #info-bar-orbs .orb-1 {
    width: 180px; height: 90px;
    background: radial-gradient(circle, rgba(240,192,64,0.08), transparent 70%);
    left: 8%; top: -20px;
    animation: orb-float-1 7s ease-in-out infinite, orb-fade 3s ease forwards 0.5s;
  }
  #info-bar-orbs .orb-2 {
    width: 220px; height: 110px;
    background: radial-gradient(circle, rgba(96,165,250,0.05), transparent 70%);
    left: 38%; top: -30px;
    animation: orb-float-2 9s ease-in-out infinite, orb-fade 3s ease forwards 1s;
  }
  #info-bar-orbs .orb-3 {
    width: 160px; height: 80px;
    background: radial-gradient(circle, rgba(240,192,64,0.06), transparent 70%);
    right: 12%; top: -15px;
    animation: orb-float-3 6s ease-in-out infinite, orb-fade 3s ease forwards 1.5s;
  }
  @keyframes orb-fade { to { opacity: 1; } }

  /* Frosted pill containers for each section */
  .bar-pill {
    background: transparent;
    border: none;
    border-radius: 14px;
    padding: 6px 14px;
    transition: background 0.3s;
    position: relative;
  }

  .bar-left  { display: flex; align-items: center; gap: 18px; }
  .bar-right { display: flex; align-items: center; justify-content: flex-end; gap: 14px; }
  .bar-center { text-align: center; flex: 1; }

  /* Shared text-shadow for readability over any background */
  .date-day, .date-full, .clock-time, .clock-sec, .clock-ampm,
  .wx-temp, .wx-desc, .wx-city, .wx-row {
    text-shadow:
      0 1px 8px rgba(0,0,0,0.70),
      0 2px 20px rgba(0,0,0,0.55),
      0 0 40px rgba(0,0,0,0.35);
  }

  /* Date */
  .date-day {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: rgba(255,255,255,0.95);
  }
  .date-full { font-size: 11px; color: rgba(255,255,255,0.60); margin-top: 1px; }

  /* Mini calendar */
  .mini-cal { display: flex; gap: 5px; }
  .cal-col  { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .cal-dn   { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.45); text-shadow: 0 1px 8px rgba(0,0,0,0.70); }
  .cal-dd   { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 7px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.60); text-shadow: 0 1px 8px rgba(0,0,0,0.70); }
  .cal-dd.today {
    background: rgba(240,192,64,0.85);
    backdrop-filter: blur(4px);
    color: var(--dark); font-weight: 700;
    box-shadow: 0 0 12px rgba(240,192,64,0.50), 0 2px 8px rgba(0,0,0,0.40);
    text-shadow: none;
  }

  /* Clock */
  .clock-time {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; color: rgba(255,255,255,0.97); line-height: 1;
  }
  .clock-sec  { font-size: 18px; color: rgba(255,255,255,0.55); }
  .clock-ampm { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: rgba(255,255,255,0.50); margin-top: 3px; text-transform: uppercase; }

  /* Weather */
  .wx-main  { display: flex; align-items: center; gap: 10px; }
  .wx-icon  { font-size: 32px; line-height: 1; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.55)); }
  .wx-temp  { font-family: 'DM Serif Display', serif; font-size: 26px; color: rgba(255,255,255,0.97); line-height: 1; }
  .wx-info  { line-height: 1.5; }
  .wx-desc  { font-size: 12px; color: rgba(255,255,255,0.80); text-transform: capitalize; }
  .wx-city  { font-size: 10px; color: rgba(255,255,255,0.52); }
  .wx-extra { display: flex; flex-direction: column; gap: 3px; }
  .wx-row   { font-size: 11px; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 4px; }

  /* Liquid glass divider between bar sections */
  .bar-divider {
    width: 1px;
    height: 36px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255,255,255,0.14) 30%,
      rgba(240,192,64,0.22) 50%,
      rgba(255,255,255,0.14) 70%,
      transparent
    );
    animation: border-glow 3s ease-in-out infinite;
  }

  /* Admin link */
  #admin-link {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 15px; border-radius: 9px;
    background: rgba(240,192,64,0.10);
    border: 1px solid rgba(240,192,64,0.22);
    color: rgba(240,192,64,0.85);
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-decoration: none; white-space: nowrap;
    transition: all 0.25s;
    backdrop-filter: blur(6px);
    text-shadow: 0 1px 8px rgba(0,0,0,0.55);
    box-shadow: 0 2px 12px rgba(0,0,0,0.20), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  #admin-link:hover {
    background: rgba(240,192,64,0.22);
    color: var(--accent);
    border-color: rgba(240,192,64,0.55);
    box-shadow: 0 4px 20px rgba(240,192,64,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
    transform: translateY(-1px);
  }

  /* Text-slide theme backgrounds */
  .theme-blue   { background: linear-gradient(145deg,#0a1628,#1a3a6e,#0d2040); }
  .theme-purple { background: linear-gradient(145deg,#160822,#3d1a6e,#120620); }
  .theme-green  { background: linear-gradient(145deg,#041410,#0e4028,#061810); }
  .theme-amber  { background: linear-gradient(145deg,#130a00,#5a2e00,#1a0e00); }
  .theme-rose   { background: linear-gradient(145deg,#1a0410,#6e1040,#180310); }
  .theme-teal   { background: linear-gradient(145deg,#021414,#0a4040,#021818); }

  /* ══════════════════════════════════════════════════════
     FULLY RESPONSIVE — works on any device & aspect ratio
     Strategy: CSS variables + clamp() + media queries
     Breakpoints: 360 / 480 / 768 / 1024 / 1440 / 1920 / 2560
  ══════════════════════════════════════════════════════ */

  /* ── Info bar: fluid sizing via clamp throughout ── */
  #info-bar {
    padding: 0 clamp(10px, 3vw, 32px);
    gap: clamp(8px, 2vw, 24px);
  }
  .date-day   { font-size: clamp(12px, 1.8vw, 22px); }
  .date-full  { font-size: clamp(8px,  1.1vw, 12px); }
  .clock-time { font-size: clamp(20px, 3.2vw, 38px); }
  .clock-sec  { font-size: clamp(12px, 1.8vw, 22px); }
  .clock-ampm { font-size: clamp(8px,  0.9vw, 11px); }
  .wx-temp    { font-size: clamp(16px, 2.2vw, 30px); }
  .wx-icon    { font-size: clamp(20px, 2.8vw, 36px); }
  .wx-desc    { font-size: clamp(9px,  1.0vw, 13px); }
  .wx-city    { font-size: clamp(8px,  0.8vw, 11px); }
  .wx-row     { font-size: clamp(8px,  0.9vw, 12px); }
  #admin-link { font-size: clamp(9px,  0.9vw, 12px); padding: clamp(5px,0.6vw,9px) clamp(8px,1.2vw,16px); }

  /* Arrows fluid */
  .arrow      { width: clamp(34px, 4vw, 58px); height: clamp(34px, 4vw, 58px); }
  .arrow svg  { width: clamp(14px, 1.8vw, 24px); height: clamp(14px, 1.8vw, 24px); }
  .arrow-prev { left: clamp(8px, 1.5vw, 24px); }
  .arrow-next { right: clamp(8px, 1.5vw, 24px); }

  /* Dots fluid */
  .dot.active { width: clamp(18px, 2.5vw, 30px); }
  .play-btn   { width: clamp(30px, 3.5vw, 42px); height: clamp(30px, 3.5vw, 42px); }

  /* Slide content padding fluid */
  .slide-content        { padding: var(--slide-pad-y) var(--slide-pad-x); }
  .slide-content-center { padding: clamp(20px, 5vh, 80px) clamp(20px, 8vw, 140px); }

  /* Slide title fluid */
  .slide-title { font-size: clamp(1.4rem, 4.5vw, 5.5rem); }
  .slide-content-center .slide-title { font-size: clamp(2rem, 7vw, 7rem); }

  /* Slide number fluid */
  .slide-number { font-size: clamp(0.6rem, 1vw, 0.92rem); top: clamp(10px,1.5vh,24px); right: clamp(10px,1.5vw,24px); }

  /* ── Tablet portrait ≤768px ── */
  @media (max-width: 768px) {
    :root { --bar-h: 68px; }
    .mini-cal    { display: none; }
    .wx-extra    { display: none; }
    .bar-divider { display: none; }
    #info-bar    { grid-template-columns: auto 1fr auto auto; }
  }

  /* ── Mobile portrait ≤540px ── */
  @media (max-width: 540px) {
    :root { --bar-h: 58px; }
    .mini-cal    { display: none; }
    .wx-extra    { display: none; }
    .bar-divider { display: none; }
    .wx-city     { display: none; }
    #info-bar    { grid-template-columns: auto 1fr auto auto; padding: 0 8px; gap: 6px; }
    .bar-left    { gap: 6px; }
    .bar-right   { gap: 6px; }
  }

  /* ── Very small ≤380px ── */
  @media (max-width: 380px) {
    :root { --bar-h: 52px; }
    .wx-main   { display: none; }
    #info-bar  { grid-template-columns: 1fr auto auto; }
  }

  /* ── Mobile landscape (short height) ── */
  @media (max-height: 480px) {
    :root { --bar-h: 48px; }
    .mini-cal  { display: none; }
    .wx-extra  { display: none; }
    .wx-city   { display: none; }
    .slider-controls { bottom: 8px; }
  }

  /* ── Large desktop ≥1440px ── */
  @media (min-width: 1440px) {
    :root { --bar-h: 92px; }
  }

  /* ── Full HD / TV ≥1920px ── */
  @media (min-width: 1920px) {
    :root { --bar-h: 104px; }
  }

  /* ── 4K ≥2560px ── */
  @media (min-width: 2560px) {
    :root { --bar-h: 120px; }
  }

  /* ── 4:3 ratio (projectors, old monitors) ── */
  @media (max-aspect-ratio: 4/3) {
    .slide-content-center { padding: clamp(16px, 4vw, 60px); }
  }

  /* ── Ultra-wide 21:9+ ── */
  @media (min-aspect-ratio: 21/9) {
    .slide-content-center { padding: clamp(40px, 5vw, 80px) clamp(100px, 18vw, 280px); }
  }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">LOADING BULLETIN BOARD…</div>
</div>

<!-- Debug overlay — remove once working -->
<div id="dbg" style="
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:99998;background:rgba(0,0,0,0.85);color:#f0c040;
  font:700 13px/1.6 monospace;padding:8px 16px;border-radius:8px;
  border:1px solid #f0c040;pointer-events:none;text-align:center;
  max-width:90vw;
">Loading Firebase…</div>

<!-- ═══ SLIDER ══════════════════════════════════════════════════════════ -->
<div class="slider" id="slider">

  <div class="progress-bar" id="progressBar"></div>

  <!-- Slides track — filled dynamically from Firebase -->

  <!-- Empty state shown when no posts -->

  <!-- Arrows -->
  <button class="arrow arrow-prev" id="prevBtn" aria-label="Previous">

      <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor" style="display:none">

</div>

<!-- ═══ INFO BAR ════════════════════════════════════════════════════════ -->
<div id="info-bar">
  <!-- Liquid ambient orbs -->
  <div id="info-bar-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="bar-left">
    <div>
      <div class="date-day" id="b-day">Monday</div>
      <div class="date-full" id="b-date">April 27, 2026</div>
    </div>
    <div class="bar-divider"></div>

  </div>

  <div class="bar-center">
    <div class="clock-time">
      <span id="b-h">12</span>:<span id="b-m">00</span><span class="clock-sec">:<span id="b-s">00</span></span>

  <a href="login.html" id="admin-link">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
    Login

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── CONFIG ── */
const FB = {
  apiKey:"AIzaSyBOm8OKOhHd_PCf8FeRkkscffne81MAaFc",
  authDomain:"digitalbulletinboard-54f06.firebaseapp.com",
  databaseURL:"https://digitalbulletinboard-54f06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"digitalbulletinboard-54f06",
  storageBucket:"digitalbulletinboard-54f06.firebasestorage.app",
  messagingSenderId:"987342604782",
  appId:"1:987342604782:web:90f8a7e895e8f8a2b026ff"
};
const db = getDatabase(initializeApp(FB));
const OWM_KEY  = "f5168c305674a67a705409181a80046d";
const OWM_CITY = "Cebu City";
const WX_ICONS = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'};

/* ── DOM ── */
const track    = document.getElementById('slidesTrack');
const dotsWrap = document.getElementById('dots');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');
const playBtn  = document.getElementById('playBtn');
const progBar  = document.getElementById('progressBar');
const sliderEl = document.getElementById('slider');
const emptyEl  = document.getElementById('empty-state');

/* ── STATE ── */
let posts     = [];
let slides    = [];
let dotBtns   = [];
let cur       = 0;
let playing   = true;
let autoTmr   = null;
let progTmr   = null;
let progStart = 0;
let interval  = 7000;
let firstLoad = true;

/* ════════════════════════════════════════════════════
   CORE SLIDER — identical logic to the working slider
   Every slide is 100vw wide; track shifts by -cur*100vw
════════════════════════════════════════════════════ */

function goTo(n) {
  if (!slides.length) return;
  const total = slides.length;

  // stop video on old slide
  slides[cur]?.querySelector('video')?.pause();

  cur = ((n % total) + total) % total;

  // shift the track
  track.style.transform = `translateX(-${cur * 100}vw)`;

  // mark active slide + dot
  slides.forEach((s, i) => s.classList.toggle('active', i === cur));
  dotBtns.forEach((d, i) => d.classList.toggle('active', i === cur));

  // start video on new slide
  const vid = slides[cur]?.querySelector('video');
  if (vid) { vid.currentTime = 0; vid.play().catch(()=>{}); }
}

function resetProg() {
  progStart = performance.now();
  progBar.style.transition = 'none';
  progBar.style.width = '0%';
  void progBar.offsetWidth; // force reflow
}

function tickProg() {
  const pct = Math.min(((performance.now() - progStart) / interval) * 100, 100);
  progBar.style.width = pct + '%';
}

function startAuto() {
  stopAuto();
  if (!slides.length) return;

  interval = Number(posts[cur]?.duration) || 7000;

  // video slide: onended advances; long timeout as safety net
  const vid = slides[cur]?.querySelector('video');
  if (vid) {
    interval = 60000;
    vid.onended = () => { goTo(cur + 1); startAuto(); };
    vid.play().catch(()=>{});
  }

  resetProg();
  progTmr = setInterval(tickProg, 50);
  autoTmr = setTimeout(() => { goTo(cur + 1); startAuto(); }, interval);
}

function stopAuto() {
  clearTimeout(autoTmr);  autoTmr = null;
  clearInterval(progTmr); progTmr = null;
}

/* ── REBUILD from posts[] ── */
function rebuild() {
  stopAuto();
  track.innerHTML    = '';
  dotsWrap.innerHTML = '';
  slides  = [];
  dotBtns = [];

  if (!posts.length) {
    emptyEl.classList.add('show');
    prevBtn.style.visibility = 'hidden';
    nextBtn.style.visibility = 'hidden';
    return;
  }
  emptyEl.classList.remove('show');
  prevBtn.style.visibility = '';
  nextBtn.style.visibility = '';

  posts.forEach((p, i) => {
    // ── SLIDE ──
    const s = document.createElement('div');
    s.className = 'slide';

    if (p.type === 'text') {
      const bg = document.createElement('div');
      bg.className = 'slide-bg theme-' + (p.bgtheme || 'blue');
      const ov = document.createElement('div'); ov.className = 'slide-overlay';
      const co = document.createElement('div'); co.className = 'slide-content-center';
      const bodyText = p.content || '';
      const len = bodyText.length;
      // Scale font size down as content gets longer
      let fontSize;
      if      (len <= 60)  fontSize = 'clamp(1.6rem, 3.2vw, 2.4rem)';
      else if (len <= 120) fontSize = 'clamp(1.3rem, 2.6vw, 2.0rem)';
      else if (len <= 220) fontSize = 'clamp(1.1rem, 2.2vw, 1.6rem)';
      else if (len <= 350) fontSize = 'clamp(0.95rem, 1.9vw, 1.35rem)';
      else if (len <= 500) fontSize = 'clamp(0.85rem, 1.6vw, 1.15rem)';
      else                 fontSize = 'clamp(0.75rem, 1.4vw, 1.0rem)';
      co.innerHTML = '<span class="slide-tag">' + x(p.category||'Announcement') + '</span>'
        + '<h2 class="slide-title">' + x(p.title||'') + '</h2>'
        + '<p class="slide-body" style="font-size:' + fontSize + '">' + x(p.content||'') + '</p>';
      s.append(bg, ov, co);

    } else if (p.type === 'image') {
      const img = document.createElement('img');
      img.className = 'slide-img';
      img.src = p.mediaUrl || ''; img.alt = p.title || '';
      const ov = document.createElement('div'); ov.className = 'slide-overlay';
      const co = document.createElement('div'); co.className = 'slide-content';
      co.innerHTML = '<span class="slide-tag">' + x(p.category||'Photo') + '</span>'
        + '<h2 class="slide-title">' + x(p.title||'') + '</h2>'
        + (p.content ? '<p class="slide-body">' + x(p.content) + '</p>' : '');
      s.append(img, ov, co);

    } else if (p.type === 'video') {
      const vid = document.createElement('video');
      vid.className = 'slide-vid';
      vid.muted = false; vid.playsInline = true; vid.preload = 'auto';
      const src = document.createElement('source');
      src.src = p.mediaUrl || ''; src.type = 'video/mp4';
      vid.appendChild(src);
      const ov = document.createElement('div'); ov.className = 'slide-overlay';
      const co = document.createElement('div'); co.className = 'slide-content';
      co.innerHTML = '<span class="slide-tag">' + x(p.category||'Video') + '</span>'
        + '<h2 class="slide-title">' + x(p.title||'') + '</h2>';
      s.append(vid, ov, co);
    }

    // slide number badge
    const num = document.createElement('div');
    num.className = 'slide-number';
    num.innerHTML = '<strong>' + String(i+1).padStart(2,'0') + '</strong> / ' + String(posts.length).padStart(2,'0');
    s.appendChild(num);

    track.appendChild(s);
    slides.push(s);

    // ── DOT ──
    const d = document.createElement('button');
    d.className = 'dot';
    d.setAttribute('aria-label', 'Slide ' + (i+1));
    d.addEventListener('click', (e) => { e.stopPropagation(); goTo(i); startAuto(); });
    dotsWrap.appendChild(d);
    dotBtns.push(d);
  });
}

/* ── FIREBASE ── */
onValue(ref(db, 'posts'), snap => {
  const prevKey = posts[cur]?._key ?? null;
  posts = [];

  if (snap.exists()) {
    snap.forEach(child => {
      posts.push({ _key: child.key, ...child.val() });
    });
  }

  console.log('[Display] posts loaded:', posts.length, posts.map(p=>p.title));
  const dbgEl = document.getElementById('dbg');
  if (dbgEl) {
    if (posts.length === 0) {
      dbgEl.textContent = 'Firebase: 0 posts found — check DB rules or path';
    } else {
      dbgEl.textContent = 'Firebase: ' + posts.length + ' post(s) → ' + posts.map(p=>p.title||'?').join(' | ');
      setTimeout(()=>{ if(dbgEl) dbgEl.style.display='none'; }, 6000);
    }
  }

  rebuild();

  if (firstLoad) {
    firstLoad = false;
    cur = 0;
    goTo(0);
    startAuto();
    const ldr = document.getElementById('loader');
    if (ldr) { ldr.classList.add('fade'); setTimeout(()=>ldr.remove(), 700); }
  } else {
    stopAuto();
    const ni = posts.findIndex(p => p._key === prevKey);
    cur = ni >= 0 ? ni : 0;
    goTo(cur);
    startAuto();
  }
});

/* ── ONE-TIME GET to cross-check onValue ── */
// This runs once and independently confirms what's actually in the DB
get(ref(db, 'posts')).then(snap => {
  const count = snap.exists() ? snap.size : 0;
  console.log('[Display] get() cross-check: ' + count + ' posts in DB');
  const dbgEl = document.getElementById('dbg');
  if (dbgEl && count > 0 && posts.length === 0) {
    // onValue hasn't fired yet or failed — manually load
    dbgEl.textContent = 'onValue delayed — loading via get()...';
    posts = [];
    snap.forEach(child => posts.push({ _key: child.key, ...child.val() }));
    rebuild();
    cur = 0; goTo(0); startAuto();
    setTimeout(()=>{ if(dbgEl) dbgEl.style.display='none'; }, 4000);
  }
}).catch(e => {
  console.error('[Display] get() failed:', e);
  const dbgEl = document.getElementById('dbg');
  if (dbgEl) dbgEl.textContent = 'DB read failed: ' + e.message + ' — check Firebase rules';
});

/* ── PLAY / PAUSE ── */
function togglePlay() {
  playing = !playing;
  document.getElementById('iconPause').style.display = playing ? '' : 'none';
  document.getElementById('iconPlay').style.display  = playing ? 'none' : '';
  if (playing) {
    startAuto();
  } else {
    stopAuto();
    slides[cur]?.querySelector('video')?.pause();
  }
}
playBtn.addEventListener('click', togglePlay);

/* ── ARROWS ── */
prevBtn.addEventListener('click', (e) => { e.stopPropagation(); goTo(cur - 1); if (playing) startAuto(); });
nextBtn.addEventListener('click', (e) => { e.stopPropagation(); goTo(cur + 1); if (playing) startAuto(); });

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')            { goTo(cur - 1); if (playing) startAuto(); }
  else if (e.key === 'ArrowRight')      { goTo(cur + 1); if (playing) startAuto(); }
  else if (e.key === ' ')               { e.preventDefault(); togglePlay(); }
  else if (e.key==='f'||e.key==='F')    { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen().catch(()=>{}); }
});

/* ── SWIPE / DRAG ── */
let touchStartX = 0;
let mouseStartX = 0;
let dragging    = false;

// Touch
sliderEl.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });

sliderEl.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    diff > 0 ? goTo(cur + 1) : goTo(cur - 1);
    if (playing) startAuto();
  }
}, { passive: true });

// Mouse drag
sliderEl.addEventListener('mousedown', e => {
  // ignore clicks on buttons/dots
  if (e.target.closest('button, a')) return;
  mouseStartX = e.clientX;
  dragging    = true;
  track.style.transition = 'none';
});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const diff = e.clientX - mouseStartX;
  track.style.transform = `translateX(calc(-${cur * 100}vw + ${diff * 0.5}px))`;
});

window.addEventListener('mouseup', e => {
  if (!dragging) return;
  dragging = false;
  track.style.transition = '';
  const diff = mouseStartX - e.clientX;
  if (Math.abs(diff) > 60) {
    diff > 0 ? goTo(cur + 1) : goTo(cur - 1);
    if (playing) startAuto();
  } else {
    goTo(cur); // snap back
  }
});

/* ── UTILS ── */
function x(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── CLOCK ── */
function tick() {
  const n = new Date();
  let h = n.getHours();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('b-h').textContent    = String(h).padStart(2,'0');
  document.getElementById('b-m').textContent    = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('b-s').textContent    = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('b-ampm').textContent = ap;
  const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('b-day').textContent  = D[n.getDay()];
  document.getElementById('b-date').textContent = M[n.getMonth()] + ' ' + n.getDate() + ', ' + n.getFullYear();
}

/* ── MINI CALENDAR ── */
function buildCal() {
  const now = new Date(), t = now.getDate();
  const DN = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const cal = document.getElementById('b-cal');
  cal.innerHTML = '';
  for (let off = -2; off <= 3; off++) {
    const d = new Date(now); d.setDate(t + off);
    const col = document.createElement('div'); col.className = 'cal-col';
    const dn  = document.createElement('div'); dn.className = 'cal-dn'; dn.textContent = DN[d.getDay()];
    const dd  = document.createElement('div'); dd.className = 'cal-dd' + (off===0?' today':''); dd.textContent = d.getDate();
    col.append(dn, dd); cal.appendChild(col);
  }
}

/* ── WEATHER ── */
async function fetchWeather() {
  try {
    const r = await fetch('https://api.openweathermap.org/data/2.5/weather?q=' + encodeURIComponent(OWM_CITY) + '&appid=' + OWM_KEY + '&units=metric');
    const j = await r.json();
    if (j.cod !== 200) throw 0;
    document.getElementById('wx-icon').textContent = WX_ICONS[j.weather[0].icon] || '🌡️';
    document.getElementById('wx-temp').textContent = Math.round(j.main.temp) + '°';
    document.getElementById('wx-desc').textContent = j.weather[0].description;
    document.getElementById('wx-city').textContent = j.name + ', ' + j.sys.country;
    document.getElementById('wx-hum').textContent  = '💧 ' + j.main.humidity + '%';
    document.getElementById('wx-wind').textContent = '💨 ' + Math.round(j.wind.speed * 3.6) + ' km/h';
  } catch { document.getElementById('wx-desc').textContent = 'Unavailable'; }
}

/* ── AUTOPLAY SOUND UNLOCK ─────────────────────────────────────────────────
   Browsers block autoplay with audio until the user interacts with the page.
   Show a one-time "tap to enable sound" overlay, then unlock on first click.
── */
const soundOverlay = document.createElement('div');
soundOverlay.id = 'sound-unlock';
soundOverlay.innerHTML = `
  <div style="
    position:fixed;bottom:calc(var(--bar-h) + 16px);left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);
    border:1px solid rgba(240,192,64,0.4);border-radius:99px;
    padding:10px 22px;z-index:999;
    font-family:'Bebas Neue',sans-serif;font-size:14px;
    letter-spacing:0.12em;color:rgba(255,255,255,0.75);
    cursor:pointer;user-select:none;white-space:nowrap;
    animation:fadeInUp 0.5s ease both;
  ">🔇 TAP ANYWHERE TO ENABLE SOUND</div>`;
document.body.appendChild(soundOverlay);

document.addEventListener('click', function unlockSound() {
  // Unmute any currently playing video
  slides.forEach(s => {
    const v = s.querySelector('video');
    if (v) v.muted = false;
  });
  soundOverlay.remove();
  document.removeEventListener('click', unlockSound);
}, { once: false });

// Add fadeInUp keyframe if not present
if (!document.getElementById('sound-kf')) {
  const st = document.createElement('style');
  st.id = 'sound-kf';
  st.textContent = '@keyframes fadeInUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }';
  document.head.appendChild(st);
}

/* ── INIT ── */
setInterval(tick, 1000); tick();
buildCal();
fetchWeather();
setInterval(fetchWeather, 600000);
</script>
</body>
