<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin Board Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent:     #f0c040;
    --accent2:    #ffdd77;
    --dark:       #0d0d0d;
    --light:      #f5f2eb;
    --glass:      rgba(255,255,255,0.08);
    --transition: 0.72s cubic-bezier(0.77, 0, 0.18, 1);
    --bar-h:      86px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    transition: opacity 0.6s;
  }
  #loader.fade { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 56px; height: 56px;
    border: 3px solid rgba(240,192,64,0.18);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 0.14em;
    color: rgba(255,255,255,0.35);
  }

  /* ═══════════════════════════════════════════════════════
     SLIDER — fullscreen, exact structure from working slider
  ═══════════════════════════════════════════════════════ */
  .slider {
    position: fixed;
    top: 0; left: 0; right: 0;
    bottom: var(--bar-h);
    background: #111;
    cursor: grab;
    user-select: none;
    overflow: hidden;
  }
  .slider:active { cursor: grabbing; }

  /* Grain texture */
  .slider::before {
    content: '';
    position: absolute; inset: 0; z-index: 5;
    opacity: 0.03; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* TRACK — flex row, slides sit side by side */
  .slides-track {
    display: flex;
    height: 100%;
    width: max-content;        /* prevent flex from compressing the row */
    will-change: transform;
    transition: transform var(--transition);
  }

  /* SLIDE */
  .slide {
    width: 100vw;              /* each slide = full viewport width */
    height: 100%;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Gradient bg for text slides */
  .slide-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transform: scale(1.06);
    transition: transform var(--transition);
  }
  .slide.active .slide-bg { transform: scale(1.0); }

  /* Image for image slides */
  .slide-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    transform: scale(1.06);
    transition: transform var(--transition);
  }
  .slide.active .slide-img { transform: scale(1.0); }

  /* Video */
  .slide-vid {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }

  /* Dark gradient overlay on every slide */
  .slide-overlay {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(
      135deg,
      rgba(0,0,0,0.65) 0%,
      rgba(0,0,0,0.08) 50%,
      rgba(0,0,0,0.30) 100%
    );
  }

  /* SLIDE CONTENT — bottom left, animates up on active */
  .slide-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 2;
    padding: clamp(24px, 5%, 60px);
    transform: translateY(14px);
    opacity: 0;
    transition: transform 0.6s 0.15s ease, opacity 0.6s 0.15s ease;
  }
  .slide.active .slide-content { transform: translateY(0); opacity: 1; }

  .slide-tag {
    display: inline-block;
    background: var(--accent); color: var(--dark);
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 4px 13px; border-radius: 4px; margin-bottom: 10px;
  }

  .slide-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5.5vw, 5rem);
    color: #fff; letter-spacing: 0.04em;
    line-height: 1.05; margin-bottom: 10px;
    text-shadow: 0 2px 24px rgba(0,0,0,0.5);
  }

  .slide-body {
    font-size: clamp(0.82rem, 1.8vw, 1.1rem);
    color: rgba(255,255,255,0.72);
    font-weight: 300; line-height: 1.65; max-width: 560px;
  }

  /* Slide number — top right */
  .slide-number {
    position: absolute; top: 22px; right: 22px; z-index: 6;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.88rem; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.45);
    opacity: 0; transform: translateY(-8px);
    transition: opacity 0.4s 0.3s, transform 0.4s 0.3s;
    pointer-events: none;
  }
  .slide.active .slide-number { opacity: 1; transform: translateY(0); }
  .slide-number strong { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-bar {
    position: absolute; top: 0; left: 0;
    height: 3px; width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    z-index: 20; pointer-events: none;
    border-radius: 0 2px 2px 0;
    box-shadow: 0 0 10px rgba(240,192,64,0.55);
  }

  /* ARROWS */
  .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.18);
    backdrop-filter: blur(12px);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.2s, border-color 0.2s;
    pointer-events: all;
  }
  .arrow:hover {
    background: var(--accent); border-color: var(--accent);
    color: var(--dark); transform: translateY(-50%) scale(1.1);
  }
  .arrow:active { transform: translateY(-50%) scale(0.94); }
  .arrow-prev { left: 20px; }
  .arrow-next { right: 20px; }
  .arrow svg { width: 22px; height: 22px; }

  /* DOTS + PLAY/PAUSE — bottom center of slider */
  .slider-controls {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex; align-items: center; gap: 14px;
  }

  .dots { display: flex; align-items: center; gap: 8px; }
  .dot {
    width: 8px; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.25);
    cursor: pointer; border: none; padding: 0;
    transition: width 0.35s ease, background 0.3s;
  }
  .dot.active {
    width: 28px; background: var(--accent);
    box-shadow: 0 0 10px rgba(240,192,64,0.4);
  }

  .play-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    backdrop-filter: blur(8px);
  }
  .play-btn:hover {
    background: var(--accent); border-color: var(--accent);
    color: var(--dark); transform: scale(1.1);
  }
  .play-btn svg { width: 15px; height: 15px; }

  /* EMPTY STATE */
  #empty-state {
    position: absolute; inset: 0; z-index: 8;
    display: none; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  #empty-state.show { display: flex; }
  #empty-state .ei { font-size: 54px; }
  #empty-state p {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.25);
  }
  #empty-state small { font-size: 12px; color: rgba(255,255,255,0.15); }

  /* ═══════════════════════════════════════════════════════
     INFO BAR
  ═══════════════════════════════════════════════════════ */
  #info-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: rgba(6,6,10,0.97);
    border-top: 1px solid rgba(240,192,64,0.10);
    backdrop-filter: blur(24px);
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    align-items: center;
    padding: 0 28px; gap: 20px;
    z-index: 100;
  }

  .bar-left  { display: flex; align-items: center; gap: 18px; }
  .bar-right { display: flex; align-items: center; justify-content: flex-end; gap: 14px; }
  .bar-center { text-align: center; }

  /* Date */
  .date-day {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--light);
  }
  .date-full { font-size: 11px; color: rgba(255,255,255,0.32); margin-top: 1px; }

  /* Mini calendar */
  .mini-cal { display: flex; gap: 5px; }
  .cal-col  { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .cal-dn   { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(255,255,255,0.26); }
  .cal-dd   { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 7px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.38); }
  .cal-dd.today { background: var(--accent); color: var(--dark); font-weight: 700; box-shadow: 0 0 10px rgba(240,192,64,0.3); }

  /* Clock */
  .clock-time {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; color: var(--light); line-height: 1;
  }
  .clock-sec  { font-size: 18px; color: rgba(255,255,255,0.32); }
  .clock-ampm { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; color: rgba(255,255,255,0.30); margin-top: 3px; text-transform: uppercase; }

  /* Weather */
  .wx-main  { display: flex; align-items: center; gap: 10px; }
  .wx-icon  { font-size: 32px; line-height: 1; }
  .wx-temp  { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--light); line-height: 1; }
  .wx-info  { line-height: 1.5; }
  .wx-desc  { font-size: 12px; color: rgba(255,255,255,0.62); text-transform: capitalize; }
  .wx-city  { font-size: 10px; color: rgba(255,255,255,0.26); }
  .wx-extra { display: flex; flex-direction: column; gap: 3px; }
  .wx-row   { font-size: 11px; color: rgba(255,255,255,0.32); display: flex; align-items: center; gap: 4px; }

  /* Admin link */
  #admin-link {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 15px; border-radius: 9px;
    background: rgba(240,192,64,0.07);
    border: 1px solid rgba(240,192,64,0.16);
    color: rgba(240,192,64,0.65);
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-decoration: none; white-space: nowrap;
    transition: all 0.2s;
  }
  #admin-link:hover { background: rgba(240,192,64,0.16); color: var(--accent); border-color: rgba(240,192,64,0.45); }

  /* Text-slide theme backgrounds */
  .theme-blue   { background: linear-gradient(145deg,#0a1628,#1a3a6e,#0d2040); }
  .theme-purple { background: linear-gradient(145deg,#160822,#3d1a6e,#120620); }
  .theme-green  { background: linear-gradient(145deg,#041410,#0e4028,#061810); }
  .theme-amber  { background: linear-gradient(145deg,#130a00,#5a2e00,#1a0e00); }
  .theme-rose   { background: linear-gradient(145deg,#1a0410,#6e1040,#180310); }
  .theme-teal   { background: linear-gradient(145deg,#021414,#0a4040,#021818); }
</style>
</head>
<body>

  <a href="admin.html" id="admin-link">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── FIREBASE ────────────────────────────────────────────────────────────── */
const FB = {
  apiKey:            "AIzaSyBOm8OKOhHd_PCf8FeRkkscffne81MAaFc",
  authDomain:        "digitalbulletinboard-54f06.firebaseapp.com",
  databaseURL:       "https://digitalbulletinboard-54f06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "digitalbulletinboard-54f06",
  storageBucket:     "digitalbulletinboard-54f06.firebasestorage.app",
  messagingSenderId: "987342604782",
  appId:             "1:987342604782:web:90f8a7e895e8f8a2b026ff"
};
const db = getDatabase(initializeApp(FB));

/* ── WEATHER ─────────────────────────────────────────────────────────────── */
const OWM_KEY  = "f5168c305674a67a705409181a80046d";
const OWM_CITY = "Cebu City";
const OWM_UNIT = "metric";
const WX_ICONS = {
  '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️',
  '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
  '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
};

/* ── DOM ─────────────────────────────────────────────────────────────────── */
const track       = document.getElementById('slidesTrack');
const dotsWrap    = document.getElementById('dots');
const prevBtn     = document.getElementById('prevBtn');
const nextBtn     = document.getElementById('nextBtn');
const playBtn     = document.getElementById('playBtn');
const iconPause   = document.getElementById('iconPause');
const iconPlay    = document.getElementById('iconPlay');
const progressBar = document.getElementById('progressBar');
const sliderEl    = document.getElementById('slider');
const emptyEl     = document.getElementById('empty-state');

/* ═══════════════════════════════════════════════════════════════════════════
   SLIDER ENGINE — direct port of the proven working slider logic
   Key insight: slides sit in a flex row; translateX(-N*100%) scrolls to slide N
═══════════════════════════════════════════════════════════════════════════ */
let posts      = [];   // data from Firebase
let slides     = [];   // DOM elements
let dots       = [];   // dot buttons
let current    = 0;
let isPlaying  = true;
let autoTimer  = null;
let progTimer  = null;
let startTime  = null;
let INTERVAL   = 7000;
let firstLoad  = true;
const TICK     = 50;   // ms between progress bar ticks

/* ── Firebase listener ───────────────────────────────────────────────────── */
onValue(ref(db, 'posts'), snap => {
  const prevKey = posts[current]?._key ?? null;
  posts = [];
  if (snap.exists()) snap.forEach(c => posts.push({ _key: c.key, ...c.val() }));

  rebuild();

  if (firstLoad) {
    firstLoad = false;
    goTo(0);
    if (isPlaying) startAuto();
    const ldr = document.getElementById('loader');
    if (ldr) { ldr.classList.add('fade'); setTimeout(() => ldr.remove(), 700); }
  } else {
    stopAuto();
    const ni = posts.findIndex(p => p._key === prevKey);
    current = ni >= 0 ? ni : 0;
    goTo(current);
    if (isPlaying) startAuto();
  }
});

/* ── Build DOM from posts[] ──────────────────────────────────────────────── */
function rebuild() {
  stopAuto();
  track.innerHTML  = '';
  dotsWrap.innerHTML = '';
  slides = [];
  dots   = [];

  if (!posts.length) {
    emptyEl.classList.add('show');
    prevBtn.style.visibility = 'hidden';
    nextBtn.style.visibility = 'hidden';
    return;
  }
  emptyEl.classList.remove('show');
  prevBtn.style.visibility = '';
  nextBtn.style.visibility = '';

  posts.forEach((p, i) => {
    const s = makeSlide(p, i);
    track.appendChild(s);
    slides.push(s);

    const d = document.createElement('button');
    d.className = 'dot';
    d.setAttribute('aria-label', `Slide ${i + 1}`);
    d.addEventListener('click', () => { goTo(i); if (isPlaying) startAuto(); });
    dotsWrap.appendChild(d);
    dots.push(d);
  });
}

/* ── Create one slide element ────────────────────────────────────────────── */
function makeSlide(p, i) {
  const s = document.createElement('div');
  s.className = 'slide';

  if (p.type === 'text') {
    const bg = document.createElement('div');
    bg.className = `slide-bg theme-${p.bgtheme || 'blue'}`;
    const ov = document.createElement('div'); ov.className = 'slide-overlay';
    const co = document.createElement('div'); co.className = 'slide-content';
    co.innerHTML = `
      <span class="slide-tag">${esc(p.category || 'Announcement')}</span>
      <h2 class="slide-title">${esc(p.title || '')}</h2>
      <p class="slide-body">${esc(p.content || '')}</p>`;
    s.append(bg, ov, co);

  } else if (p.type === 'image') {
    const img = document.createElement('img');
    img.className = 'slide-img';
    img.src = p.mediaUrl || ''; img.alt = p.title || '';
    const ov = document.createElement('div'); ov.className = 'slide-overlay';
    const co = document.createElement('div'); co.className = 'slide-content';
    co.innerHTML = `
      <span class="slide-tag">${esc(p.category || 'Photo')}</span>
      <h2 class="slide-title">${esc(p.title || '')}</h2>
      ${p.content ? `<p class="slide-body">${esc(p.content)}</p>` : ''}`;
    s.append(img, ov, co);

  } else if (p.type === 'video') {
    const vid = document.createElement('video');
    vid.className = 'slide-vid';
    vid.muted = true; vid.playsInline = true; vid.preload = 'auto';
    const src = document.createElement('source');
    src.src = p.mediaUrl || ''; src.type = 'video/mp4';
    vid.appendChild(src);
    const ov = document.createElement('div'); ov.className = 'slide-overlay';
    const co = document.createElement('div'); co.className = 'slide-content';
    co.innerHTML = `
      <span class="slide-tag">${esc(p.category || 'Video')}</span>
      <h2 class="slide-title">${esc(p.title || '')}</h2>`;
    s.append(vid, ov, co);
  }

  // Slide number badge
  const num = document.createElement('div');
  num.className = 'slide-number';
  num.innerHTML = `<strong>${String(i + 1).padStart(2,'0')}</strong> / ${String(posts.length).padStart(2,'0')}`;
  s.appendChild(num);
  return s;
}

/* ── goTo(index) — translateX, same as proven working slider ─────────────── */
function goTo(index) {
  if (!slides.length) return;
  const total = slides.length;

  // Pause video on outgoing slide
  const outVid = slides[current]?.querySelector('video');
  if (outVid) { outVid.pause(); outVid.onended = null; }

  current = ((index % total) + total) % total;

  // THE core move — shift the flex track
  track.style.transform = `translateX(-${current * 100}vw)`;

  // Sync active class on slides and dots
  slides.forEach((s, i) => s.classList.toggle('active', i === current));
  dots.forEach((d, i)   => d.classList.toggle('active', i === current));

  // Play video on incoming slide
  const inVid = slides[current]?.querySelector('video');
  if (inVid) { inVid.currentTime = 0; inVid.play().catch(() => {}); }
}

/* ── Progress bar (setInterval tick — exact from working slider) ──────────── */
function resetProgress() {
  startTime = performance.now();
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  void progressBar.offsetWidth;   // force reflow
}

function tickProgress() {
  if (!isPlaying) return;
  const pct = Math.min(((performance.now() - startTime) / INTERVAL) * 100, 100);
  progressBar.style.width = pct + '%';
}

/* ── Auto play (setTimeout + setInterval — exact from working slider) ────── */
function startAuto() {
  stopAuto();
  if (!slides.length) return;

  INTERVAL = Number(posts[current]?.duration) || 7000;

  // Video slides: onended drives the advance; use long fallback
  const vid = slides[current]?.querySelector('video');
  if (vid) {
    vid.onended = () => { goTo(current + 1); startAuto(); };
    vid.play().catch(() => {});
    INTERVAL = 60000;
  }

  resetProgress();
  progTimer = setInterval(tickProgress, TICK);
  autoTimer = setTimeout(() => { goTo(current + 1); startAuto(); }, INTERVAL);
}

function stopAuto() {
  clearTimeout(autoTimer);  autoTimer = null;
  clearInterval(progTimer); progTimer = null;
}

/* ── Toggle play/pause ───────────────────────────────────────────────────── */
function togglePlay() {
  isPlaying = !isPlaying;
  iconPause.style.display = isPlaying ? ''     : 'none';
  iconPlay.style.display  = isPlaying ? 'none' : '';
  if (isPlaying) {
    startAuto();
    slides[current]?.querySelector('video')?.play().catch(() => {});
  } else {
    stopAuto();
    slides[current]?.querySelector('video')?.pause();
  }
}

/* ── Events — arrows, play, keyboard ────────────────────────────────────── */
prevBtn.addEventListener('click', () => { goTo(current - 1); if (isPlaying) startAuto(); });
nextBtn.addEventListener('click', () => { goTo(current + 1); if (isPlaying) startAuto(); });
playBtn.addEventListener('click', togglePlay);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')       { goTo(current - 1); if (isPlaying) startAuto(); }
  if (e.key === 'ArrowRight')      { goTo(current + 1); if (isPlaying) startAuto(); }
  if (e.key === ' ')               { e.preventDefault(); togglePlay(); }
  if (e.key === 'f' || e.key === 'F') {
    document.fullscreenElement
      ? document.exitFullscreen()
      : document.documentElement.requestFullscreen().catch(() => {});
  }
});

/* ── Swipe & drag — exact port from working slider ──────────────────────── */
let dragStartX = null;
let isDragging = false;

function onPointerDown(e) {
  dragStartX = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
  isDragging = true;
}
function onPointerMove(e) {
  if (!isDragging) return;
  const x    = e.type.startsWith('touch') ? e.touches[0].clientX : e.clientX;
  const diff = x - dragStartX;
  track.style.transition = 'none';
  track.style.transform  = `translateX(calc(-${current * 100}vw + ${diff * 0.4}px))`;
}
function onPointerUp(e) {
  if (!isDragging) return;
  isDragging = false;
  track.style.transition = '';  // restore CSS transition
  const endX = e.type.startsWith('touch') ? e.changedTouches[0].clientX : e.clientX;
  const diff  = dragStartX - endX;
  if (Math.abs(diff) > 50) {
    diff > 0 ? goTo(current + 1) : goTo(current - 1);
    if (isPlaying) startAuto();
  } else {
    goTo(current); // snap back
  }
  dragStartX = null;
}

sliderEl.addEventListener('mousedown',  onPointerDown);
sliderEl.addEventListener('mousemove',  onPointerMove);
sliderEl.addEventListener('mouseup',    onPointerUp);
sliderEl.addEventListener('mouseleave', onPointerUp);
sliderEl.addEventListener('touchstart', onPointerDown, { passive: true });
sliderEl.addEventListener('touchmove',  onPointerMove, { passive: true });
sliderEl.addEventListener('touchend',   onPointerUp);

// Pause on hover, resume on leave — same as working slider
sliderEl.addEventListener('mouseenter', () => { if (isPlaying) stopAuto(); });
sliderEl.addEventListener('mouseleave', () => { if (isPlaying && !isDragging) startAuto(); });

/* ── HTML escape ─────────────────────────────────────────────────────────── */
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════════════════════════════════ */
function tick() {
  const n = new Date();
  let h   = n.getHours();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('b-h').textContent    = String(h).padStart(2,'0');
  document.getElementById('b-m').textContent    = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('b-s').textContent    = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('b-ampm').textContent = ap;
  const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('b-day').textContent  = D[n.getDay()];
  document.getElementById('b-date').textContent = `${M[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   MINI CALENDAR
═══════════════════════════════════════════════════════════════════════════ */
function buildCal() {
  const now = new Date(), t = now.getDate();
  const DN  = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const cal = document.getElementById('b-cal');
  cal.innerHTML = '';
  for (let off = -2; off <= 3; off++) {
    const d   = new Date(now); d.setDate(t + off);
    const col = document.createElement('div'); col.className = 'cal-col';
    const dn  = document.createElement('div'); dn.className = 'cal-dn'; dn.textContent = DN[d.getDay()];
    const dd  = document.createElement('div'); dd.className = 'cal-dd' + (off === 0 ? ' today' : ''); dd.textContent = d.getDate();
    col.append(dn, dd); cal.appendChild(col);
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   WEATHER
═══════════════════════════════════════════════════════════════════════════ */
async function fetchWeather() {
  try {
    const r = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(OWM_CITY)}&appid=${OWM_KEY}&units=${OWM_UNIT}`
    );
    const j = await r.json();
    if (j.cod !== 200) throw new Error(j.message);
    document.getElementById('wx-icon').textContent = WX_ICONS[j.weather[0].icon] || '🌡️';
    document.getElementById('wx-temp').textContent = `${Math.round(j.main.temp)}°`;
    document.getElementById('wx-desc').textContent = j.weather[0].description;
    document.getElementById('wx-city').textContent = `${j.name}, ${j.sys.country}`;
    document.getElementById('wx-hum').textContent  = `💧 ${j.main.humidity}%`;
    document.getElementById('wx-wind').textContent = `💨 ${Math.round(j.wind.speed * 3.6)} km/h`;
  } catch {
    document.getElementById('wx-desc').textContent = 'Weather unavailable';
  }
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
setInterval(tick, 1000); tick();
buildCal();
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);
</script>
