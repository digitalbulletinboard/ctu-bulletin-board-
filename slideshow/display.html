<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulletin Board Display</title>
  <link rel="shortcut icon" href="logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bar-h: 88px;
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --white: #ffffff;
      --ink: #0f172a;
      --muted: rgba(255,255,255,0.60);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0f172a;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }

    /* Slides container */
    #slides-container {
      position: absolute;
      inset: 0;
      pointer-events: none;  /* children handle their own pointer events */
    }

    /* ══════════════════════════════════════════════════════════
       LOADING SCREEN
    ══════════════════════════════════════════════════════════ */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #0f172a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity 0.7s ease;
    }
    #loader.fade { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 64px; height: 64px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
    }

    /* ══════════════════════════════════════════════════════════
       SLIDER STAGE
    ══════════════════════════════════════════════════════════ */
    #stage {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: var(--bar-h);
      background: #0f172a;
      overflow: hidden;
    }

    /* ── SLIDES ── */
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(1.04);
      transition: opacity 0.9s cubic-bezier(.4,0,.2,1),
                  transform 0.9s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      z-index: 1;
    }
    .slide.active {
      opacity: 1; transform: scale(1);
      pointer-events: auto; z-index: 2;
    }
    #slides-container .slide { pointer-events: none; }
    #slides-container .slide.active { pointer-events: auto; }
    /* .exit class removed — slides deactivate cleanly via removing .active */

    /* TEXT SLIDES */
    .slide-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .theme-blue   { background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 50%, #0c2340 100%); }
    .theme-purple { background: linear-gradient(145deg, #1a0a2e 0%, #3b1f6a 50%, #160828 100%); }
    .theme-green  { background: linear-gradient(145deg, #052e16 0%, #14532d 50%, #0a3520 100%); }
    .theme-amber  { background: linear-gradient(145deg, #1c0f00 0%, #78350f 50%, #3b1c00 100%); }
    .theme-rose   { background: linear-gradient(145deg, #1f0612 0%, #7f1d4e 50%, #1a0510 100%); }
    .theme-teal   { background: linear-gradient(145deg, #011f20 0%, #134e4a 50%, #021d1e 100%); }

    /* Geometric accent shape */
    .slide-text::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      top: -200px; right: -100px;
      pointer-events: none;
    }
    .slide-text::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
      bottom: -150px; left: -50px;
      pointer-events: none;
    }

    .text-content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 60px 80px;
      max-width: 1000px;
      animation: textReveal 0.7s cubic-bezier(.4,0,.2,1) 0.1s both;
    }
    @keyframes textReveal {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .slide-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 18px; border-radius: 99px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.10);
    }
    .slide-tag::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .slide-headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 6.5vw, 88px);
      color: #ffffff;
      line-height: 1.08;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 40px rgba(0,0,0,0.4);
    }
    .slide-headline em {
      font-style: italic;
      background: linear-gradient(135deg, #93c5fd, #c4b5fd);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slide-body {
      font-size: clamp(16px, 2.2vw, 28px);
      color: rgba(255,255,255,0.72);
      line-height: 1.7; font-weight: 300;
      max-width: 720px; margin: 0 auto;
    }

    /* decorative line */
    .slide-divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      margin: 22px auto;
    }

    /* IMAGE SLIDES */
    .slide-image { position: absolute; inset: 0; }
    .slide-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .img-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.75) 0%,
        rgba(0,0,0,0.20) 40%,
        rgba(0,0,0,0.05) 100%
      );
    }
    .img-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 32px 52px 36px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .cap-left { max-width: 70%; }
    .cap-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.7);
      margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
    }
    .cap-tag::before {
      content: ''; width: 20px; height: 1px;
      background: rgba(255,255,255,0.5); display: inline-block;
    }
    .cap-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(22px, 4vw, 54px);
      color: white; line-height: 1.15;
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    /* VIDEO SLIDES */
    .slide-video { position: absolute; inset: 0; }
    .slide-video video {
      width: 100%; height: 100%;
      object-fit: cover; background: #000;
    }
    .vid-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
      pointer-events: none;
    }
    .vid-caption {
      position: absolute; bottom: 32px; left: 52px; right: 52px;
    }
    .vid-tag {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.65);
      margin-bottom: 6px;
    }
    .vid-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(20px, 3.5vw, 46px);
      color: white; text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }

    /* ══════════════════════════════════════════════════════════
       ARROWS
    ══════════════════════════════════════════════════════════ */
    .arrow-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      z-index: 100;
      width: 52px; height: 52px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      color: white; font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      user-select: none;
    }
    .arrow-btn:hover {
      background: rgba(59,130,246,0.5);
      border-color: rgba(59,130,246,0.6);
      transform: translateY(-50%) scale(1.08);
      box-shadow: 0 8px 32px rgba(59,130,246,0.3);
    }
    .arrow-btn:active { transform: translateY(-50%) scale(0.94); }
    #btn-prev { left: 20px; }
    #btn-next { right: 20px; }

    /* Arrow SVG icons */
    .arrow-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ══════════════════════════════════════════════════════════
       PLAY / PAUSE BUTTON
    ══════════════════════════════════════════════════════════ */
    #play-pause {
      position: absolute;
      top: 18px; right: 80px;
      z-index: 100;
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 12px;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    #play-pause:hover {
      background: rgba(59,130,246,0.4);
      border-color: rgba(59,130,246,0.5);
    }
    #play-pause svg { width: 16px; height: 16px; fill: white; }

    /* ══════════════════════════════════════════════════════════
       SLIDE COUNTER
    ══════════════════════════════════════════════════════════ */
    #slide-counter {
      position: absolute;
      top: 18px; left: 20px;
      z-index: 100;
      font-size: 12px; font-weight: 600;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.30);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 8px 14px; border-radius: 10px;
      letter-spacing: 0.05em;
    }

    /* ══════════════════════════════════════════════════════════
       DOTS
    ══════════════════════════════════════════════════════════ */
    #dots-wrap {
      position: absolute;
      bottom: 18px; left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: 8px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 99px;
      background: rgba(255,255,255,0.32);
      border: 1px solid rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.35s cubic-bezier(.4,0,.2,1);
    }
    .dot:hover { background: rgba(255,255,255,0.6); }
    .dot.active {
      background: white;
      width: 28px;
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    /* ══════════════════════════════════════════════════════════
       PROGRESS BAR
    ══════════════════════════════════════════════════════════ */
    #progress-track {
      position: fixed;
      bottom: var(--bar-h);
      left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.10);
      z-index: 200;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
      transition: width 0s linear;
      border-radius: 0 2px 2px 0;
      box-shadow: 0 0 8px rgba(59,130,246,0.6);
    }

    /* ══════════════════════════════════════════════════════════
       INFO BAR
    ══════════════════════════════════════════════════════════ */
    #info-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: rgba(10,14,28,0.96);
      backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      align-items: center;
      padding: 0 28px; gap: 20px;
      z-index: 150;
    }

    /* Left — date + mini cal */
    .bar-left { display: flex; align-items: center; gap: 20px; }

    .date-block { line-height: 1.3; }
    .date-day {
      font-family: 'DM Serif Display', serif;
      font-size: 22px; color: white;
      font-weight: 400;
    }
    .date-full { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }

    .mini-cal { display: flex; gap: 6px; }
    .cal-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .cal-dname {
      font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.35);
    }
    .cal-dnum {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px;
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.50);
    }
    .cal-dnum.today {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      box-shadow: 0 2px 8px rgba(59,130,246,0.4);
    }

    /* Center — clock */
    .bar-center { text-align: center; }
    .clock-time {
      font-family: 'DM Serif Display', serif;
      font-size: 34px; color: white; line-height: 1;
    }
    .clock-sec { font-size: 20px; color: rgba(255,255,255,0.4); }
    .clock-ampm {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4); margin-top: 3px;
      text-transform: uppercase;
    }

    /* Right — weather */
    .bar-right { display: flex; align-items: center; justify-content: flex-end; gap: 16px; }

    .wx-main { display: flex; align-items: center; gap: 12px; }
    .wx-icon { font-size: 36px; line-height: 1; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
    .wx-temp {
      font-family: 'DM Serif Display', serif;
      font-size: 28px; color: white; line-height: 1;
    }
    .wx-info { line-height: 1.5; }
    .wx-desc { font-size: 13px; color: rgba(255,255,255,0.7); text-transform: capitalize; }
    .wx-city { font-size: 10px; color: rgba(255,255,255,0.35); }

    .wx-extra { display: flex; flex-direction: column; gap: 4px; }
    .wx-row { font-size: 11px; color: rgba(255,255,255,0.4); display: flex; align-items: center; gap: 5px; }

    /* Admin link */
    #admin-link {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.5);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.2s;
    }
    #admin-link:hover {
      background: rgba(59,130,246,0.15);
      border-color: rgba(59,130,246,0.3);
      color: #93c5fd;
    }

    /* ══════════════════════════════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════════════════════════════ */
    #empty-state {
      position: absolute; inset: 0; z-index: 5;
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; color: rgba(255,255,255,0.3);
      font-family: 'DM Serif Display', serif;
    }
    #empty-state.show { display: flex; }
    #empty-state .empty-icon { font-size: 64px; opacity: 0.4; }
    #empty-state p { font-size: 22px; }
    #empty-state small { font-family: 'DM Sans', sans-serif; font-size: 13px; }

    /* ══════════════════════════════════════════════════════════
       SWIPE HINT (fades after first swipe)
    ══════════════════════════════════════════════════════════ */
    #swipe-hint {
      position: absolute;
      bottom: 56px; left: 50%; transform: translateX(-50%);
      z-index: 99;
      font-size: 11px; color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
      animation: hintPulse 2s ease-in-out 2s 3;
      opacity: 0;
    }
    @keyframes hintPulse {
      0%,100% { opacity: 0; } 30%,70% { opacity: 1; }
    }
    .swipe-icon { font-size: 16px; }

    /* ══════════════════════════════════════════════════════════
       CUSTOM CURSOR
    ══════════════════════════════════════════════════════════ */
    #cursor {
      position: fixed; z-index: 99999;
      width: 12px; height: 12px;
      background: white; border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.2s, height 0.2s, opacity 0.3s;
      mix-blend-mode: difference;
    }
    #cursor.big { width: 40px; height: 40px; opacity: 0.4; }

    /* No slides yet animations */
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    #empty-state .empty-icon { animation: float 3s ease-in-out infinite; }

  </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor"></div>

<!-- Loader -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">Loading Bulletin Board…</div>
</div>

<!-- Stage -->
<div id="stage">
  <!-- Slides rendered here -->

  <!-- Slides container — separate from arrow buttons so insertions stay ordered -->
  <div id="slides-container"></div>

  <!-- Navigation arrows -->
  <button class="arrow-btn" id="btn-prev" title="Previous">
    <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"></polyline></svg>
  </button>
  <button class="arrow-btn" id="btn-next" title="Next">
    <svg viewBox="0 0 24 24"><polyline points="9,18 15,12 9,6"></polyline></svg>
  </button>

  <!-- Play/Pause -->
  <button id="play-pause" title="Play / Pause">
    <svg id="pp-icon" viewBox="0 0 24 24">
      <rect x="6" y="4" width="4" height="16"></rect>
      <rect x="14" y="4" width="4" height="16"></rect>
    </svg>
  </button>

  <!-- Slide counter -->
  <div id="slide-counter">1 / 1</div>

  <!-- Dots -->
  <div id="dots-wrap"></div>

  <!-- Swipe hint -->
  <div id="swipe-hint"><span class="swipe-icon">👆</span> Swipe to navigate</div>

  <!-- Empty state -->
  <div id="empty-state">
    <div class="empty-icon">📭</div>
    <p>No slides yet</p>
    <small>Add slides from the admin panel</small>
  </div>
</div>

<!-- Progress bar -->
<div id="progress-track"><div id="progress-fill"></div></div>

<!-- Info bar -->
<div id="info-bar">
  <div class="bar-left">
    <div class="date-block">
      <div class="date-day" id="b-day">Monday</div>
      <div class="date-full" id="b-date">April 27, 2026</div>
    </div>
    <div class="mini-cal" id="b-cal"></div>
  </div>

  <div class="bar-center">
    <div class="clock-time">
      <span id="b-h">12</span>:<span id="b-m">00</span><span class="clock-sec">:<span id="b-s">00</span></span>
    </div>
    <div class="clock-ampm" id="b-ampm">AM</div>
  </div>

  <div class="bar-right">
    <div class="wx-main">
      <div class="wx-icon" id="wx-icon">⛅</div>
      <div>
        <div class="wx-temp" id="wx-temp">--°</div>
        <div class="wx-info">
          <div class="wx-desc" id="wx-desc">Loading…</div>
          <div class="wx-city" id="wx-city"></div>
        </div>
      </div>
    </div>
    <div class="wx-extra">
      <div class="wx-row" id="wx-hum">💧 --%</div>
      <div class="wx-row" id="wx-wind">💨 -- km/h</div>
    </div>
  </div>

  <a href="admin.html" id="admin-link">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
    Admin
  </a>
</div>

const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const cursor   = document.getElementById('cursor');

/* ── STATE ───────────────────────────────────────────────────────────────── */
let posts    = [];
let idx      = 0;
let timer    = null;
let paused   = false;
let loaded   = false;
let pauseStart = 0;
let remainMs   = 0;

/* ── ICONS (SVG paths) ───────────────────────────────────────────────────── */
const PAUSE_SVG = `<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>`;
const PLAY_SVG  = `<polygon points="5,3 19,12 5,21"></polygon>`;

/* ── WEATHER ICON MAP ────────────────────────────────────────────────────── */
const WX_ICONS = {
  '01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️',
  '04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️',
  '11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'
};

/* ── FIREBASE ─────────────────────────────────────────────────────────────── */
onValue(ref(db, 'posts'), snap => {
  const prevKey = posts[idx]?._key ?? null;
  posts = [];
  if (snap.exists()) snap.forEach(c => posts.push({ _key: c.key, ...c.val() }));

  rebuild();

  if (!loaded) {
    loaded = true;
    go(0);
    const ldr = document.getElementById('loader');
    ldr.classList.add('fade');
    setTimeout(() => ldr.remove(), 800);
  } else {
    const ni = posts.findIndex(p => p._key === prevKey);
    idx = ni >= 0 ? ni : 0;
    go(idx);
  }
});

/* ── BUILD SLIDES ─────────────────────────────────────────────────────────── */
function rebuild() {
  const sc = document.getElementById('slides-container');
  if (sc) sc.innerHTML = '';
  dotsWrap.innerHTML = '';

  if (!posts.length) {
    emptyEl.classList.add('show');
    btnPrev.style.opacity = '0'; btnPrev.style.pointerEvents = 'none';
    btnNext.style.opacity = '0'; btnNext.style.pointerEvents = 'none';
    counter.textContent = '0 / 0';
    kill();
    return;
  }

  emptyEl.classList.remove('show');
  btnPrev.style.opacity = ''; btnPrev.style.pointerEvents = '';
  btnNext.style.opacity = ''; btnNext.style.pointerEvents = '';

  const slidesContainer = document.getElementById('slides-container');
  posts.forEach((p, i) => {
    slidesContainer.appendChild(mkSlide(p, i));

    const d = document.createElement('span');
    d.className = 'dot';
    d.dataset.i = i;
    d.addEventListener('click', () => go(i));
    dotsWrap.appendChild(d);
  });
}

function mkSlide(p, i) {
  const s = document.createElement('div');
  s.className = 'slide';
  s.dataset.i = i;

  if (p.type === 'text') {
    const wrap = document.createElement('div');
    wrap.className = `slide-text theme-${p.bgtheme || 'blue'}`;

    // highlight first word with italics for visual interest
    const titleParts = (p.title || '').split(' ');
    const titleHTML = titleParts.length > 1
      ? `<em>${titleParts[0]}</em> ${titleParts.slice(1).join(' ')}`
      : p.title || '';

    wrap.innerHTML = `
      <div class="text-content">
        <div class="slide-tag">${p.category || 'Announcement'}</div>
        <div class="slide-headline">${titleHTML}</div>
        <div class="slide-divider"></div>
        <div class="slide-body">${p.content || ''}</div>
      </div>`;
    s.appendChild(wrap);

  } else if (p.type === 'image') {
    const wrap = document.createElement('div');
    wrap.className = 'slide-image';
    const img = document.createElement('img');
    img.src = p.mediaUrl || ''; img.alt = p.title || '';
    // Ken Burns zoom effect
    img.style.cssText = `
      animation: kenburns ${(Number(p.duration)||7000)/1000 + 2}s ease-out both;
    `;
    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    const cap = document.createElement('div');
    cap.className = 'img-caption';
    cap.innerHTML = `
      <div class="cap-left">
        <div class="cap-tag">${p.category || 'Photo'}</div>
        <div class="cap-title">${p.title || ''}</div>
      </div>`;
    wrap.append(img, overlay, cap);
    s.appendChild(wrap);

  } else if (p.type === 'video') {
    const wrap = document.createElement('div');
    wrap.className = 'slide-video';
    const vid = document.createElement('video');
    vid.muted = true; vid.playsInline = true; vid.preload = 'auto';
    const src = document.createElement('source');
    src.src = p.mediaUrl || ''; src.type = 'video/mp4';
    vid.appendChild(src);
    const vOverlay = document.createElement('div');
    vOverlay.className = 'vid-overlay';
    const vCap = document.createElement('div');
    vCap.className = 'vid-caption';
    vCap.innerHTML = `
      <div class="vid-tag">${p.category || 'Video'}</div>
      <div class="vid-title">${p.title || ''}</div>`;
    wrap.append(vid, vOverlay, vCap);
    s.appendChild(wrap);
  }

  return s;
}

/* ── Ken Burns keyframes (injected once) ─────────────────────────────────── */
if (!document.getElementById('kb-style')) {
  const st = document.createElement('style');
  st.id = 'kb-style';
  st.textContent = `
    @keyframes kenburns {
      from { transform: scale(1.08) translate(1%, 1%); }
      to   { transform: scale(1.00) translate(0%, 0%); }
    }`;
  document.head.appendChild(st);
}

/* ── GO TO SLIDE ─────────────────────────────────────────────────────────── */
let exitTimer = null;   // separate timer for removing .exit class

function go(i) {
  const slidesContainer = document.getElementById('slides-container');
  const slides = Array.from(slidesContainer.querySelectorAll('.slide'));
  const dots   = Array.from(dotsWrap.querySelectorAll('.dot'));
  if (!slides.length) return;

  kill();

  // Cancel any pending exit-class cleanup from a previous rapid navigation
  if (exitTimer) { clearTimeout(exitTimer); exitTimer = null; }

  i = ((i % slides.length) + slides.length) % slides.length;

  // Deactivate ALL slides immediately — no intermediate state
  slides.forEach((s, si) => {
    s.classList.remove('active', 'exit');
    dots[si]?.classList.remove('active');
    const v = s.querySelector('video');
    if (v) { v.pause(); v.currentTime = 0; v.onended = null; }
    const img = s.querySelector('.slide-image img');
    if (img) { img.style.animation = 'none'; }
  });

  idx = i;
  const slide = slides[i];
  slide.classList.add('active');
  dots[i]?.classList.add('active');
  counter.textContent = `${i + 1} / ${posts.length}`;

  // Re-trigger Ken Burns with a tiny delay so the browser registers the reset
  const img = slide.querySelector('.slide-image img');
  if (img) {
    const dur = (Number(posts[i]?.duration) || 7000) / 1000 + 2;
    requestAnimationFrame(() => {
      img.style.animation = `kenburns ${dur}s ease-out both`;
    });
  }

  if (paused) return;

  // Video slide
  const vid = slide.querySelector('video');
  if (vid) {
    progressBar(0);
    vid.onended = () => go(idx + 1);

    const startV = () => {
      vid.play().catch(() => {});
      const dur = (isFinite(vid.duration) && vid.duration > 0) ? vid.duration * 1000 : 10000;
      progressBar(dur);
      timer = setTimeout(() => go(idx + 1), dur + 300);
    };

    if (vid.readyState >= 1) startV();
    else {
      vid.addEventListener('loadedmetadata', startV, { once: true });
      timer = setTimeout(() => { vid.removeEventListener('loadedmetadata', startV); go(idx + 1); }, 12000);
    }
    return;
  }

  // Text / image slide
  const ms = Number(posts[i]?.duration) || 7000;
  remainMs = ms;
  progressBar(ms);
  timer = setTimeout(() => go(idx + 1), ms);
}

/* ── PROGRESS BAR ────────────────────────────────────────────────────────── */
function progressBar(ms) {
  pFill.style.transition = 'none';
  pFill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    pFill.style.transition = `width ${ms}ms linear`;
    pFill.style.width = '100%';
  }));
}

function kill() {
  if (timer) { clearTimeout(timer); timer = null; }
}

/* ── PLAY / PAUSE ─────────────────────────────────────────────────────────── */
ppBtn.addEventListener('click', () => {
  paused = !paused;
  ppIcon.innerHTML = paused ? PLAY_SVG : PAUSE_SVG;

  if (paused) {
    kill();
    // Pause progress bar
    const computed = getComputedStyle(pFill).width;
    const trackW   = pFill.parentElement.offsetWidth;
    const pct      = (parseFloat(computed) / trackW) * 100;
    pFill.style.transition = 'none';
    pFill.style.width = pct + '%';

    const vid = stage.querySelector('.slide.active video');
    if (vid) vid.pause();
  } else {
    const vid = stage.querySelector('.slide.active video');
    if (vid) {
      vid.play().catch(() => {});
      const ms = vid.duration ? (vid.duration - vid.currentTime) * 1000 : 7000;
      progressBar(ms);
      timer = setTimeout(() => go(idx + 1), ms);
    } else {
      const ms = Number(posts[idx]?.duration) || 7000;
      progressBar(ms);
      timer = setTimeout(() => go(idx + 1), ms);
    }
  }
});

/* ── ARROWS ──────────────────────────────────────────────────────────────── */
btnPrev.addEventListener('click', e => { e.stopPropagation(); go(idx - 1); });
btnNext.addEventListener('click', e => { e.stopPropagation(); go(idx + 1); });

/* ── DOTS ────────────────────────────────────────────────────────────────── */
dotsWrap.addEventListener('click', e => {
  const i = parseInt(e.target.dataset.i);
  if (!isNaN(i)) go(i);
});

/* ── KEYBOARD ────────────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  go(idx - 1);
  if (e.key === 'ArrowRight') go(idx + 1);
  if (e.key === ' ') { e.preventDefault(); ppBtn.click(); }
  if (e.key === 'f' || e.key === 'F') {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  }
});

/* ── SWIPE GESTURES ──────────────────────────────────────────────────────── */
let touchX = 0, touchY = 0;
stage.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });

stage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    dx < 0 ? go(idx + 1) : go(idx - 1);
    // Hide swipe hint after first swipe
    const hint = document.getElementById('swipe-hint');
    if (hint) { hint.style.display = 'none'; }
  }
}, { passive: true });

/* ── CLICK STAGE TO ADVANCE ──────────────────────────────────────────────── */
stage.addEventListener('click', e => {
  // Walk composedPath so SVG children inside arrow buttons are caught correctly
  const blocked = e.composedPath().some(el =>
    el.classList && (
      el.classList.contains('arrow-btn') ||
      el.id === 'play-pause' ||
      el.id === 'dots-wrap' ||
      el.id === 'slide-counter' ||
      el.classList.contains('dot')
    )
  );
  if (blocked) return;
  go(idx + 1);
});

/* ── CUSTOM CURSOR ───────────────────────────────────────────────────────── */
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
document.querySelectorAll('button, a, .dot').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('big'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

/* ── CLOCK ───────────────────────────────────────────────────────────────── */
function tick() {
  const n  = new Date();
  let h    = n.getHours();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('b-h').textContent  = String(h).padStart(2, '0');
  document.getElementById('b-m').textContent  = String(n.getMinutes()).padStart(2, '0');
  document.getElementById('b-s').textContent  = String(n.getSeconds()).padStart(2, '0');
  document.getElementById('b-ampm').textContent = ap;
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('b-day').textContent  = DAYS[n.getDay()];
  document.getElementById('b-date').textContent = `${MONTHS[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}

/* ── MINI CALENDAR ───────────────────────────────────────────────────────── */
function buildCal() {
  const now = new Date(), t = now.getDate();
  const DN  = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const cal = document.getElementById('b-cal');
  cal.innerHTML = '';
  for (let off = -2; off <= 3; off++) {
    const d   = new Date(now); d.setDate(t + off);
    const col = document.createElement('div'); col.className = 'cal-col';
    const dn  = document.createElement('div'); dn.className = 'cal-dname'; dn.textContent = DN[d.getDay()];
    const dd  = document.createElement('div'); dd.className = 'cal-dnum' + (off === 0 ? ' today' : ''); dd.textContent = d.getDate();
    col.append(dn, dd); cal.appendChild(col);
  }
}

/* ── WEATHER ─────────────────────────────────────────────────────────────── */
async function fetchWeather() {
  try {
    const r = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(OWM_CITY)}&appid=${OWM_KEY}&units=${OWM_UNIT}`
    );
    const j = await r.json();
    if (j.cod !== 200) throw new Error(j.message);
    document.getElementById('wx-icon').textContent  = WX_ICONS[j.weather[0].icon] || '🌡️';
    document.getElementById('wx-temp').textContent  = `${Math.round(j.main.temp)}°`;
    document.getElementById('wx-desc').textContent  = j.weather[0].description;
    document.getElementById('wx-city').textContent  = `${j.name}, ${j.sys.country}`;
    document.getElementById('wx-hum').textContent   = `💧 ${j.main.humidity}%`;
    document.getElementById('wx-wind').textContent  = `💨 ${Math.round(j.wind.speed * 3.6)} km/h`;
  } catch {
    document.getElementById('wx-desc').textContent = 'Unavailable';
    document.getElementById('wx-city').textContent = 'Check OWM_KEY';
  }
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
setInterval(tick, 1000); tick();
buildCal();
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

/* Hover dot listeners (added dynamically) */
const observer = new MutationObserver(() => {
  document.querySelectorAll('button, a, .dot').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });
});
observer.observe(dotsWrap, { childList: true });
</script>
</body>
